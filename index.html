<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미니 게임</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #eee;
      padding: 1rem;
    }
    .game {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      color: #e94560;
    }
    .sub {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .range {
      text-align: center;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.5rem;
    }
    .timer {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #f1c40f;
      margin-bottom: 1.5rem;
    }
    .timer.warning {
      color: #f39c12;
      animation: pulse 0.8s ease-in-out infinite;
    }
    .timer-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .timer-bar-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #f1c40f, #e67e22);
      border-radius: 4px;
      transition: width 0.3s ease, background 0.3s;
    }
    .timer-bar.danger .timer-bar-fill {
      background: #e74c3c;
      animation: bar-pulse 0.5s ease-in-out infinite;
    }
    @keyframes bar-pulse {
      50% { opacity: 0.85; }
    }
    .countdown-pop {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      font-weight: 800;
      color: #e74c3c;
      text-shadow: 0 0 30px rgba(231,76,60,0.6);
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .countdown-pop.show {
      opacity: 1;
      animation: countdown-scale 0.4s ease-out;
    }
    @keyframes countdown-scale {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      70% { transform: translate(-50%, -50%) scale(1.15); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    @keyframes pulse {
      50% { opacity: 0.7; }
    }
    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    input[type="number"] {
      flex: 1;
      padding: 1rem 1.25rem;
      font-size: 1.1rem;
      border: 2px solid rgba(233, 69, 96, 0.3);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-family: inherit;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: #e94560;
    }
    input[type="number"]::placeholder {
      color: #666;
    }
    button {
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s, background 0.15s;
    }
    button:hover {
      background: #ff6b6b;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    .message {
      min-height: 2.5rem;
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .message.empty {
      background: transparent;
      color: transparent;
    }
    .message.hint-up {
      background: rgba(233, 69, 96, 0.2);
      color: #ff9f9f;
    }
    .message.hint-down {
      background: rgba(100, 149, 237, 0.2);
      color: #87ceeb;
    }
    .message.win {
      background: rgba(76, 175, 80, 0.3);
      color: #81c784;
    }
    .message.error {
      background: rgba(255, 152, 0, 0.2);
      color: #ffb74d;
    }
    .message.timeout {
      background: rgba(244, 67, 54, 0.25);
      color: #ef9a9a;
    }
    .tries {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
    }
    .tries span {
      color: #e94560;
      font-weight: 600;
    }
    .best {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
      margin-top: 0.25rem;
    }
    .best span {
      color: #f1c40f;
      font-weight: 600;
    }
    .again {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 1rem;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.1);
      color: #ccc;
    }
    .again:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    .difficulty {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .difficulty button {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.1);
      color: #aaa;
    }
    .difficulty button:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    .difficulty button.active {
      background: #e94560;
      color: #fff;
    }
    /* 탭 */
    .app-wrap {
      width: 100%;
      max-width: 480px;
    }
    .tab-buttons {
      display: flex;
      gap: 0;
      margin-bottom: 0;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
    }
    .tab-btn {
      flex: 1;
      padding: 0.9rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #888;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #ccc;
    }
    .tab-btn.active {
      background: rgba(255, 255, 255, 0.06);
      color: #e94560;
    }
    .tab-panel {
      display: none;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 0 0 20px 20px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: none;
    }
    .tab-panel.active {
      display: block;
    }
    /* 벽돌깨기 */
    .brick-wrap {
      text-align: center;
    }
    .brick-wrap h1 {
      margin-bottom: 0.5rem;
    }
    .brick-wrap .sub {
      margin-bottom: 1rem;
    }
    .brick-canvas-wrap {
      margin: 1rem auto;
      border-radius: 12px;
      overflow: hidden;
      background: #0d0d14;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    #brickCanvas {
      display: block;
      margin: 0 auto;
    }
    .brick-info {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #aaa;
    }
    .brick-info span {
      color: #f1c40f;
      font-weight: 700;
    }
    .brick-start {
      margin-top: 1rem;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="app-wrap">
    <div class="tab-buttons">
      <button type="button" class="tab-btn active" data-tab="guess">🔢 숫자 맞추기</button>
      <button type="button" class="tab-btn" data-tab="brick">🧱 벽돌 깨기</button>
    </div>

    <div id="panel-guess" class="tab-panel active">
  <div class="game">
    <h1>🔢 숫자 맞추기</h1>
    <p class="sub">숫자를 맞춰보세요</p>
    <div class="difficulty">
      <button type="button" data-diff="easy" id="btn-easy">쉬움 1~50 (15초)</button>
      <button type="button" data-diff="normal" id="btn-normal" class="active">보통 1~100 (30초)</button>
      <button type="button" data-diff="hard" id="btn-hard">어려움 1~300 (40초)</button>
    </div>
    <p class="range" id="rangeText">범위: 1 ~ 100</p>
    <p class="timer" id="timer">남은 시간: 40초</p>
    <div class="timer-bar" id="timerBar">
      <div class="timer-bar-fill" id="timerBarFill"></div>
    </div>

    <div class="input-row">
      <input type="number" id="guess" placeholder="숫자 입력" min="1" max="100" autofocus>
      <button type="button" id="submit">확인</button>
    </div>

    <div class="message empty" id="message"></div>
    <p class="tries">시도 횟수: <span id="tries">0</span></p>
    <p class="best">최고 기록: <span id="best">-</span></p>
    <button type="button" class="again" id="again" style="display: none;">다시 하기</button>
  </div>
    </div>

    <div id="panel-brick" class="tab-panel">
      <div class="brick-wrap">
        <h1>🧱 벽돌 깨기</h1>
        <p class="sub">패들을 움직여 공을 받고 벽돌을 모두 깨세요</p>
        <div class="brick-canvas-wrap">
          <canvas id="brickCanvas" width="400" height="480"></canvas>
        </div>
        <div class="brick-info">
          <p>점수: <span id="brickScore">0</span></p>
          <p>목숨: <span id="brickLives">3</span></p>
        </div>
        <button type="button" class="again brick-start" id="brickStart">시작하기</button>
      </div>
    </div>
  </div>

  <div class="countdown-pop" id="countdownPop" aria-hidden="true"></div>

  <script>
    (function () {
      var tabBtns = document.querySelectorAll('.tab-btn');
      var panels = document.querySelectorAll('.tab-panel');
      tabBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var tab = btn.getAttribute('data-tab');
          tabBtns.forEach(function (b) { b.classList.remove('active'); });
          panels.forEach(function (p) { p.classList.remove('active'); });
          btn.classList.add('active');
          document.getElementById('panel-' + tab).classList.add('active');
        });
      });
    })();
  </script>
  <script>
    (function () {
      var DIFF = {
        easy:   { max: 50,  time: 15 },
        normal: { max: 100, time: 30 },
        hard:   { max: 300, time: 40 }
      };
      var currentDiff = 'normal';
      var TIME_LIMIT = DIFF.normal.time;
      var MAX_NUM = DIFF.normal.max;
      var answer = 0;
      var tries = 0;
      var isDone = false;
      var timerId = null;
      var remainingSeconds = TIME_LIMIT;

      var guessInput = document.getElementById('guess');
      var submitBtn = document.getElementById('submit');
      var messageEl = document.getElementById('message');
      var triesEl = document.getElementById('tries');
      var timerEl = document.getElementById('timer');
      var againBtn = document.getElementById('again');
      var bestEl = document.getElementById('best');
      var rangeEl = document.getElementById('rangeText');
      var timerBar = document.getElementById('timerBar');
      var timerBarFill = document.getElementById('timerBarFill');
      var countdownPop = document.getElementById('countdownPop');

      function getStorageKey() {
        return 'guessTheNumberBest_' + currentDiff;
      }
      function getBest() {
        var v = localStorage.getItem(getStorageKey());
        return v === null ? null : parseInt(v, 10);
      }
      function setBest(n) {
        localStorage.setItem(getStorageKey(), String(n));
      }
      function updateBestDisplay() {
        var b = getBest();
        bestEl.textContent = b !== null ? b + '번' : '-';
      }

      function clearTimer() {
        if (timerId) {
          clearInterval(timerId);
          timerId = null;
        }
      }

      function startTimer() {
        clearTimer();
        remainingSeconds = TIME_LIMIT;
        timerEl.textContent = '남은 시간: ' + remainingSeconds + '초';
        timerEl.classList.remove('warning');
        timerBar.classList.remove('danger');
        timerBarFill.style.width = '100%';
        countdownPop.classList.remove('show');
        countdownPop.textContent = '';
        timerId = setInterval(function () {
          remainingSeconds -= 1;
          var pct = Math.max(0, (remainingSeconds / TIME_LIMIT) * 100);
          timerBarFill.style.width = pct + '%';
          timerEl.textContent = '남은 시간: ' + remainingSeconds + '초';
          if (remainingSeconds <= 5) {
            timerBar.classList.add('danger');
            timerEl.classList.add('warning');
            countdownPop.textContent = remainingSeconds;
            countdownPop.classList.add('show');
            setTimeout(function () { countdownPop.classList.remove('show'); }, 400);
          } else if (remainingSeconds <= 10) {
            timerEl.classList.add('warning');
          }
          if (remainingSeconds <= 0) {
            clearTimer();
            countdownPop.classList.remove('show');
            countdownPop.textContent = '';
            isDone = true;
            showMessage('시간 초과! 정답은 ' + answer + ' 이었어요.', 'timeout');
            guessInput.disabled = true;
            submitBtn.disabled = true;
            againBtn.style.display = 'block';
          }
        }, 1000);
      }

      function startGame() {
        var d = DIFF[currentDiff];
        MAX_NUM = d.max;
        TIME_LIMIT = d.time;
        answer = Math.floor(Math.random() * MAX_NUM) + 1;
        tries = 0;
        isDone = false;
        triesEl.textContent = '0';
        messageEl.textContent = '';
        messageEl.className = 'message empty';
        guessInput.value = '';
        guessInput.min = '1';
        guessInput.max = String(MAX_NUM);
        guessInput.placeholder = '1 ~ ' + MAX_NUM;
        guessInput.disabled = false;
        submitBtn.disabled = false;
        againBtn.style.display = 'none';
        rangeEl.textContent = '범위: 1 ~ ' + MAX_NUM;
        startTimer();
        guessInput.focus();
        updateBestDisplay();
      }

      function setDifficulty(diff) {
        if (isDone || tries === 0) {
          currentDiff = diff;
          document.querySelectorAll('.difficulty button').forEach(function (btn) {
            btn.classList.toggle('active', btn.getAttribute('data-diff') === diff);
          });
          startGame();
        }
      }

      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = 'message ' + type;
      }

      function checkGuess() {
        if (isDone) return;

        var raw = guessInput.value.trim();
        var num = parseInt(raw, 10);

        if (raw === '' || isNaN(num)) {
          showMessage('1에서 ' + MAX_NUM + ' 사이의 숫자를 입력하세요.', 'error');
          return;
        }
        if (num < 1 || num > MAX_NUM) {
          showMessage('1에서 ' + MAX_NUM + ' 사이로 입력하세요.', 'error');
          return;
        }

        tries += 1;
        triesEl.textContent = tries;

        if (num === answer) {
          isDone = true;
          clearTimer();
          countdownPop.classList.remove('show');
          countdownPop.textContent = '';
          timerBarFill.style.width = '0%';
          var best = getBest();
          var isNewBest = best === null || tries < best;
          if (isNewBest) {
            setBest(tries);
            updateBestDisplay();
          }
          var msg = '정답입니다! 🎉 (' + tries + '번 만에 맞췄어요)';
          if (remainingSeconds <= 5 && remainingSeconds > 0) {
            msg = '아슬아슬! ' + remainingSeconds + '초 남기고 성공! 🎉 (' + tries + '번 만에)';
          }
          if (isNewBest) msg += ' 최고 기록 갱신!';
          showMessage(msg, 'win');
          guessInput.disabled = true;
          submitBtn.disabled = true;
          againBtn.style.display = 'block';
          return;
        }

        if (num < answer) {
          showMessage('더 커요 ↑', 'hint-up');
        } else {
          showMessage('더 작아요 ↓', 'hint-down');
        }
        guessInput.value = '';
        guessInput.focus();
      }

      submitBtn.addEventListener('click', checkGuess);      guessInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') checkGuess();
      });
      againBtn.addEventListener('click', startGame);
      document.getElementById('btn-easy').addEventListener('click', function () { setDifficulty('easy'); });
      document.getElementById('btn-normal').addEventListener('click', function () { setDifficulty('normal'); });
      document.getElementById('btn-hard').addEventListener('click', function () { setDifficulty('hard'); });

      startGame();
    })();
  </script>
  <script>
    (function () {
      var canvas = document.getElementById('brickCanvas');
      var ctx = canvas.getContext('2d');
      var scoreEl = document.getElementById('brickScore');
      var livesEl = document.getElementById('brickLives');
      var startBtn = document.getElementById('brickStart');

      var BRICK_COLORS = ['#e74c3c', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6'];
      var COLS = 10;
      var ROWS = 6;
      var BRICK_W = 35;
      var BRICK_H = 16;
      var BRICK_PAD = 5;
      var PADDLE_W = 80;
      var PADDLE_W_WIDE = 120;
      var PADDLE_H = 12;
      var BALL_R = 6;
      var PADDLE_Y = canvas.height - 30;
      var ITEM_DROP_CHANCE = 0.28;
      var ITEM_SIZE = 14;
      var ITEM_FALL = 2.5;
      var ITEM_TYPES = [
        { id: 'expand', color: '#3498db', label: 'W' },
        { id: 'life', color: '#2ecc71', label: '+1' },
        { id: 'slow', color: '#9b59b6', label: 'S' },
        { id: 'score', color: '#f1c40f', label: '50' }
      ];

      var bricks = [];
      var items = [];
      var paddleX = (canvas.width - PADDLE_W) / 2;
      var currentPaddleW = PADDLE_W;
      var paddleExpandUntil = 0;
      var ballSlowUntil = 0;
      var ballX = canvas.width / 2;
      var ballY = PADDLE_Y - BALL_R - 2;
      var ballDX = 4;
      var ballDY = -4;
      var ballSpeedMult = 1;
      var score = 0;
      var lives = 3;
      var running = false;
      var animId = null;
      var frameCount = 0;

      function initBricks() {
        bricks = [];
        items = [];
        for (var row = 0; row < ROWS; row++) {
          for (var col = 0; col < COLS; col++) {
            bricks.push({
              x: BRICK_PAD + col * (BRICK_W + BRICK_PAD),
              y: 50 + row * (BRICK_H + BRICK_PAD),
              w: BRICK_W,
              h: BRICK_H,
              color: BRICK_COLORS[row % BRICK_COLORS.length]
            });
          }
        }
      }

      function spawnItem(brick) {
        if (Math.random() > ITEM_DROP_CHANCE) return;
        var typeIdx = Math.floor(Math.random() * ITEM_TYPES.length);
        var t = ITEM_TYPES[typeIdx];
        items.push({
          x: brick.x + brick.w / 2 - ITEM_SIZE / 2,
          y: brick.y + brick.h / 2 - ITEM_SIZE / 2,
          type: t.id,
          color: t.color,
          label: t.label
        });
      }

      function draw() {
        ctx.fillStyle = '#0d0d14';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        bricks.forEach(function (b) {
          ctx.fillStyle = b.color;
          ctx.fillRect(b.x, b.y, b.w, b.h);
          ctx.strokeStyle = 'rgba(0,0,0,0.3)';
          ctx.strokeRect(b.x, b.y, b.w, b.h);
        });

        items.forEach(function (it) {
          ctx.fillStyle = it.color;
          ctx.fillRect(it.x, it.y, ITEM_SIZE, ITEM_SIZE);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1;
          ctx.strokeRect(it.x, it.y, ITEM_SIZE, ITEM_SIZE);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 10px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(it.label, it.x + ITEM_SIZE / 2, it.y + ITEM_SIZE / 2);
        });

        var pw = currentPaddleW;
        var px = paddleX + (currentPaddleW - pw) / 2;
        if (pw > PADDLE_W) px = paddleX - (pw - PADDLE_W) / 2;
        ctx.fillStyle = '#e94560';
        ctx.fillRect(px, PADDLE_Y, pw, PADDLE_H);

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ballX, ballY, BALL_R, 0, Math.PI * 2);
        ctx.fill();
      }

      function update() {
        if (!running) return;
        frameCount++;
        ballX += ballDX * ballSpeedMult;
        ballY += ballDY * ballSpeedMult;

        if (paddleExpandUntil > 0 && frameCount >= paddleExpandUntil) {
          currentPaddleW = PADDLE_W;
          paddleExpandUntil = 0;
        }
        if (ballSlowUntil > 0 && frameCount >= ballSlowUntil) {
          ballSpeedMult = 1;
          ballSlowUntil = 0;
        }

        if (ballX - BALL_R <= 0 || ballX + BALL_R >= canvas.width) ballDX = -ballDX;
        if (ballY - BALL_R <= 0) ballDY = -ballDY;

        var pw = currentPaddleW;
        var px = paddleX;
        if (pw > PADDLE_W) px = paddleX - (pw - PADDLE_W) / 2;
        if (ballY + BALL_R >= PADDLE_Y && ballY - BALL_R <= PADDLE_Y + PADDLE_H &&
            ballX >= px && ballX <= px + pw) {
          ballDY = -Math.abs(ballDY);
          var hitPos = (ballX - px) / pw;
          ballDX = (hitPos - 0.5) * 10;
        }

        if (ballY - BALL_R > canvas.height) {
          lives--;
          livesEl.textContent = lives;
          if (lives <= 0) {
            running = false;
            cancelAnimationFrame(animId);
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('게임 오버', canvas.width / 2, canvas.height / 2);
            startBtn.style.display = 'block';
            startBtn.textContent = '다시 하기';
            return;
          }
          ballX = canvas.width / 2;
          ballY = PADDLE_Y - BALL_R - 2;
          ballDX = 4;
          ballDY = -4;
        }

        for (var i = bricks.length - 1; i >= 0; i--) {
          var b = bricks[i];
          if (ballX + BALL_R >= b.x && ballX - BALL_R <= b.x + b.w &&
              ballY + BALL_R >= b.y && ballY - BALL_R <= b.y + b.h) {
            ballDY = -ballDY;
            spawnItem(b);
            bricks.splice(i, 1);
            score += 10;
            scoreEl.textContent = score;
            if (bricks.length === 0) {
              running = false;
              cancelAnimationFrame(animId);
              ctx.fillStyle = 'rgba(0,0,0,0.7)';
              ctx.fillRect(0, 0, canvas.width, canvas.height);
              ctx.fillStyle = '#2ecc71';
              ctx.font = 'bold 24px sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText('클리어!', canvas.width / 2, canvas.height / 2);
              startBtn.style.display = 'block';
              startBtn.textContent = '다시 하기';
            }
            break;
          }
        }

        for (var j = items.length - 1; j >= 0; j--) {
          var it = items[j];
          it.y += ITEM_FALL;
          if (it.y > canvas.height) {
            items.splice(j, 1);
            continue;
          }
          var pwx = currentPaddleW;
          var pxx = paddleX;
          if (pwx > PADDLE_W) pxx = paddleX - (pwx - PADDLE_W) / 2;
          if (it.y + ITEM_SIZE >= PADDLE_Y && it.y <= PADDLE_Y + PADDLE_H &&
              it.x + ITEM_SIZE >= pxx && it.x <= pxx + pwx) {
            if (it.type === 'expand') {
              currentPaddleW = PADDLE_W_WIDE;
              paddleExpandUntil = frameCount + 600;
            } else if (it.type === 'life') {
              lives++;
              livesEl.textContent = lives;
            } else if (it.type === 'slow') {
              ballSpeedMult = 0.6;
              ballSlowUntil = frameCount + 300;
            } else if (it.type === 'score') {
              score += 50;
              scoreEl.textContent = score;
            }
            items.splice(j, 1);
          }
        }
      }

      function loop() {
        update();
        draw();
        if (running) animId = requestAnimationFrame(loop);
      }

      function startBrickGame() {
        initBricks();
        score = 0;
        lives = 3;
        frameCount = 0;
        currentPaddleW = PADDLE_W;
        paddleExpandUntil = 0;
        ballSpeedMult = 1;
        ballSlowUntil = 0;
        scoreEl.textContent = '0';
        livesEl.textContent = '3';
        paddleX = (canvas.width - PADDLE_W) / 2;
        ballX = canvas.width / 2;
        ballY = PADDLE_Y - BALL_R - 2;
        ballDX = 4;
        ballDY = -4;
        startBtn.style.display = 'none';
        running = true;
        loop();
      }

      canvas.addEventListener('mousemove', function (e) {
        var rect = canvas.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var scale = canvas.width / rect.width;
        paddleX = (x * scale) - PADDLE_W / 2;
        if (paddleX < 0) paddleX = 0;
        if (paddleX > canvas.width - PADDLE_W) paddleX = canvas.width - PADDLE_W;
      });

      startBtn.addEventListener('click', startBrickGame);
      initBricks();
      draw();
    })();
  </script>
</body>
</html>
