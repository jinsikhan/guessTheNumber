<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HoneyComb – 벌집 퍼즐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0c0c12;
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(255, 180, 80, 0.15), transparent),
        radial-gradient(ellipse 80% 50% at 80% 50%, rgba(120, 80, 200, 0.08), transparent),
        linear-gradient(180deg, #0c0c12 0%, #141422 50%, #0c0c12 100%);
      color: #eee;
      padding: 0.75rem;
      padding-left: max(0.75rem, env(safe-area-inset-left));
      padding-right: max(0.75rem, env(safe-area-inset-right));
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
    }
    .game {
      position: relative;
      background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      border-radius: 24px;
      padding: 1rem 1.25rem;
      padding-left: max(1.25rem, env(safe-area-inset-left));
      padding-right: max(1.25rem, env(safe-area-inset-right));
      max-width: 560px;
      width: 100%;
      min-width: 0;
      box-shadow:
        0 25px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .game::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,200,100,0.6), transparent);
      opacity: 0.6;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 0.15rem;
      background: linear-gradient(135deg, #ffb347 0%, #ffcc33 50%, #ff8c00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    .sub {
      text-align: center;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 1rem;
    }
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.65rem;
      background: rgba(0,0,0,0.35);
      border-radius: 12px;
      font-size: 0.85rem;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .stat-icon { font-size: 1rem; }
    .stat span.value { color: #ffc857; font-weight: 700; font-family: 'Outfit', sans-serif; }
    .stat.timer span.value { color: #7dd3fc; }
    .stat.timer.warning span.value { color: #fbbf24; animation: pulse 0.8s ease infinite; }
    .stat.timer.danger span.value { color: #f87171; animation: pulse 0.5s ease infinite; }
    @keyframes pulse { 50% { opacity: 0.85; } }
    .progress-wrap {
      width: 100%;
      height: 6px;
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      border-radius: 10px;
      transition: width 0.25s ease;
    }
    .hex-canvas-wrap {
      margin: 0.5rem auto;
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(180deg, #0d0d14 0%, #0a0a10 100%);
      box-shadow:
        inset 0 0 40px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,200,100,0.08);
      max-width: 100%;
      touch-action: manipulation;
    }
    #hexCanvas {
      display: block;
      margin: 0 auto;
      width: 100%;
      height: auto;
      max-width: 100%;
      cursor: pointer;
      touch-action: manipulation;
    }
    .mode-hint {
      text-align: center;
      font-size: 0.75rem;
      color: #555;
      margin-top: 0.5rem;
    }
    .combo-hint {
      text-align: center;
      font-size: 0.7rem;
      color: #444;
      margin-top: 0.25rem;
      line-height: 1.3;
    }
    .combo-hint strong { color: #fbbf24; font-weight: 600; }
    @media (max-width: 480px) {
      .game { padding: 0.75rem 1rem; }
      h1 { font-size: 1.5rem; }
      .stat { padding: 0.35rem 0.5rem; font-size: 0.8rem; }
    }
    .game-over-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      background: transparent;
    }
    .game-over-restart-btn {
      padding: 16px 40px;
      font-size: 1.25rem;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      color: #1a1a1a;
      background: linear-gradient(180deg, #ffc857 0%, #f59e0b 100%);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.5), 0 0 0 2px rgba(255,255,255,0.2);
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .game-over-restart-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 24px rgba(245, 158, 11, 0.6), 0 0 0 2px rgba(255,255,255,0.3);
    }
    .game-over-restart-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>HoneyComb</h1>
    <p class="sub">클릭↔클릭으로 인접 블록 맞바꾸기 · 3개 이상 맞으면 제거</p>
    <div class="stats-bar">
      <div class="stat"><span class="stat-icon">⭐</span> Lv.<span class="value" id="hexLevel">1</span></div>
      <div class="stat"><span class="stat-icon">💎</span> <span class="value" id="hexDiamonds">0/3</span></div>
      <div class="stat"><span class="stat-icon">🏆</span> <span class="value" id="hexScore">0</span></div>
      <div class="stat timer" id="timerWrap"><span class="stat-icon">⏱</span> <span class="value" id="hexTimer">30</span>초</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="levelProgress" style="width: 0%;"></div>
    </div>
    <div class="hex-canvas-wrap">
      <canvas id="hexCanvas" width="420" height="380"></canvas>
    </div>
    <p class="mode-hint">클릭→클릭: 인접 블록 맞바꾸기 (3개 이상 맞으면 제거) · 드래그로 같은 색 연속 제거</p>
    <p class="combo-hint">리필 후 또 맞으면 <strong>연쇄</strong> → 더블·트리플·익사이팅</p>
    <div id="gameOverOverlay" class="game-over-overlay" style="display:none;" aria-label="게임 오버">
      <button type="button" id="gameOverRestartBtn" class="game-over-restart-btn">다시 하기</button>
    </div>
  </div>

  <script>
(function () {
  function run() {
  var canvas = document.getElementById('hexCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  if (!ctx) return;
  var scoreEl = document.getElementById('hexScore');
  var levelEl = document.getElementById('hexLevel');
  var timerEl = document.getElementById('hexTimer');
  var timerWrap = document.getElementById('timerWrap');
  var levelProgressEl = document.getElementById('levelProgress');
  var diamondsEl = document.getElementById('hexDiamonds');
  var gameOverOverlay = document.getElementById('gameOverOverlay');
  var gameOverRestartBtn = document.getElementById('gameOverRestartBtn');

  var R = 28, GAP = 5, COLS = 5, ROWS = 5;
  var HEX_W = 2 * R, HEX_H = Math.sqrt(3) * R;
  var STEP_X, STEP_Y;
  var HEX_COLORS = ['#e74c3c', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6', '#e67e22'];
  var score = 0, level = 1, POINTS_PER_LEVEL = 450;
  var totalRemoved = 0, removedThisLevel = 0, diamondsRemovedThisLevel = 0, comboCount = 0;
  var grid = [];
  var BOMB_CHANCE = 0.06, MISSILE_CHANCE = 0.04, CROSS_CHANCE = 0.04;
  function getItemThreshold() { return 3 + level * 2; }

  var selected = [];
  var strokeColor = null;
  var isDragging = false;
  var pointerDownCell = null;
  var swapFirst = null;

  var hexAnim = null;
  var hexAnimIntervalId = null;
  var BOMB_ANIM_MS = 520, MISSILE_ANIM_MS = 400, CROSS_ANIM_MS = 450;
  var MATCH_DELAY_MS = 500;
  var matchDelayUntil = 0;
  var matchDelayTimerId = null;
  var CHAIN_STEP_DELAY_MS = 1100;
  var MAX_CHAIN_COMBO = 4;
  var chainInProgress = false;
  var chainStepTimerId = null;
  var chainStartTime = 0;
  var scorePopups = [];
  var bigTextUntil = 0, bigText = '';
  var comboShowUntil = 0, comboText = '';
  var matchFlashUntil = 0;
  var levelUpUntil = 0;
  var swapAnim = null;
  var SWAP_ANIM_DURATION_MS = 220;
  var levelStartTime = 0;
  var levelTimeLimitSec = 30;
  var gameOver = false;
  var gameOverUntil = 0;
  var timerIntervalId = null;

  function id(r, c) { return r * COLS + c; }
  function neighbors(r, c) {
    var dcEven = [-1, 0, -1, 1, -1, 0], dcOdd = [0, 1, -1, 1, 0, 1], dr = [-1, -1, 0, 0, 1, 1];
    var dc = (r % 2 === 0) ? dcEven : dcOdd;
    var out = [];
    for (var i = 0; i < 6; i++) {
      var nr = r + dr[i], nc = c + dc[i];
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) out.push({ r: nr, c: nc });
    }
    return out;
  }
  function isAdjacent(r1, c1, r2, c2) {
    var nb = neighbors(r1, c1);
    for (var i = 0; i < nb.length; i++) if (nb[i].r === r2 && nb[i].c === c2) return true;
    return false;
  }

  function hexToPixel(r, c) {
    var x = GAP + (Math.sqrt(3) * R) / 2 + c * STEP_X + (r % 2) * (STEP_X * 0.5);
    var y = GAP + R + r * STEP_Y;
    return { x: x, y: y };
  }
  function pixelToHex(px, py) {
    var rApprox = Math.floor((py - GAP - R) / STEP_Y);
    var cApprox = Math.floor((px - GAP - (Math.sqrt(3) * R) / 2 - (rApprox % 2) * (STEP_X * 0.5)) / STEP_X);
    var best = null, bestD = 1e9;
    for (var dr = -1; dr <= 1; dr++) {
      for (var dc = -1; dc <= 1; dc++) {
        var rr = rApprox + dr, cc = cApprox + dc;
        if (rr < 0 || rr >= ROWS || cc < 0 || cc >= COLS) continue;
        var p = hexToPixel(rr, cc);
        var d = Math.sqrt((px - p.x) * (px - p.x) + (py - p.y) * (py - p.y));
        if (d <= R * 0.95 && d < bestD) { bestD = d; best = { r: rr, c: cc }; }
      }
    }
    return best;
  }

  function drawHex(x, y, color, isBomb, isMissile, isCross, isDiamond, isSelected) {
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a = Math.PI / 2 + (Math.PI / 3) * i;
      var hx = x + R * Math.cos(a), hy = y + R * Math.sin(a);
      if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    var g = ctx.createRadialGradient(x - R * 0.3, y - R * 0.3, 0, x, y, R * 1.2);
    g.addColorStop(0, lightenColor(color, 0.25));
    g.addColorStop(0.6, color);
    g.addColorStop(1, darkenColor(color, 0.2));
    ctx.fillStyle = g;
    ctx.fill();
    if (isSelected) {
      ctx.strokeStyle = 'rgba(255,220,120,0.95)';
      ctx.lineWidth = 3;
      ctx.shadowColor = 'rgba(255,200,80,0.6)';
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
    if (isBomb) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.round(R * 0.7) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💣', x, y);
    } else if (isMissile) {
      ctx.font = 'bold ' + Math.round(R * 0.7) + 'px sans-serif';
      ctx.fillText('🚀', x, y);
    } else if (isCross) {
      ctx.font = 'bold ' + Math.round(R * 0.7) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✨', x, y);
    } else if (isDiamond) {
      ctx.font = 'bold ' + Math.round(R * 0.65) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💎', x, y);
    }
  }
  function lightenColor(hex, amt) {
    var r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    r = Math.min(255, r + 255 * amt); g = Math.min(255, g + 255 * amt); b = Math.min(255, b + 255 * amt);
    return '#' + [r,g,b].map(function(x){ return ('0'+Math.round(x).toString(16)).slice(-2); }).join('');
  }
  function darkenColor(hex, amt) {
    var r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    r *= (1 - amt); g *= (1 - amt); b *= (1 - amt);
    return '#' + [r,g,b].map(function(x){ return ('0'+Math.round(x).toString(16)).slice(-2); }).join('');
  }

  /** 레벨이 올라갈수록 블럭 개수 증가 (1레벨=작은 그리드, 레벨업=큰 그리드) */
  function getGridSize(lv) {
    if (lv <= 1) return { rows: 5, cols: 5 };
    if (lv === 2) return { rows: 6, cols: 5 };
    if (lv === 3) return { rows: 6, cols: 6 };
    if (lv === 4) return { rows: 7, cols: 6 };
    if (lv === 5) return { rows: 7, cols: 7 };
    if (lv === 6) return { rows: 8, cols: 7 };
    return { rows: 8, cols: 8 };
  }
  function applyGridSize() {
    var sz = getGridSize(level);
    ROWS = sz.rows;
    COLS = sz.cols;
    STEP_X = Math.sqrt(3) * R + GAP;
    STEP_Y = 1.5 * R + GAP;
    var w = 2 * GAP + (Math.sqrt(3) * R) / 2 + (COLS - 1) * STEP_X + STEP_X * 0.5 + 2 * R;
    var h = 2 * GAP + 2 * R + (ROWS - 1) * STEP_Y;
    canvas.width = Math.round(Math.max(320, Math.min(580, w)));
    canvas.height = Math.round(Math.max(300, Math.min(620, h)));
  }
  /** 레벨 올라갈수록 색상 추가 (시작은 4색으로 3개 붙기 줄임) */
  function getColorsForLevel(lv) {
    var n = Math.min(3 + lv, 6);
    return HEX_COLORS.slice(0, n);
  }

  /** 레벨업에 필요한 다이아몬드 개수: 레벨 올라갈수록 증가 (1→3, 2→5, 3→7 ...) */
  function getDiamondsToNextLevel(lv) {
    return 2 * lv + 1;
  }
  /** 그리드에 동시에 놓을 수 있는 다이아몬드 최대 개수 (제한적 노출) */
  function maxDiamondsOnGrid() {
    return 2 + Math.min(level, 2);
  }
  function countDiamondsOnGrid() {
    var n = 0;
    for (var r = 0; r < ROWS; r++)
      for (var c = 0; c < COLS; c++) {
        var cell = get(r, c);
        if (cell && cell.diamond) n++;
      }
    return n;
  }
  function countDiamondsExcluding(excludeList) {
    var set = {};
    for (var i = 0; i < excludeList.length; i++) set[excludeList[i].r + ',' + excludeList[i].c] = true;
    var n = 0;
    for (var r = 0; r < ROWS; r++)
      for (var c = 0; c < COLS; c++) {
        if (set[r + ',' + c]) continue;
        var cell = get(r, c);
        if (cell && cell.diamond) n++;
      }
    return n;
  }

  function randCell(r, c, allowDiamond) {
    var colors = getColorsForLevel(level);
    var allowItem = totalRemoved >= getItemThreshold();
    var itemMult = 1 / (1 + (level - 1) * 0.28);
    var isBomb = allowItem && Math.random() < BOMB_CHANCE * itemMult;
    var isMissile = allowItem && !isBomb && Math.random() < MISSILE_CHANCE * itemMult;
    var isCross = allowItem && !isBomb && !isMissile && Math.random() < CROSS_CHANCE * itemMult;
    var colorIdx;
    if (r != null && c != null && level >= 2) {
      var nb = neighbors(r, c);
      var neighborColors = {};
      for (var i = 0; i < nb.length; i++) {
        var cell = get(nb[i].r, nb[i].c);
        if (cell) neighborColors[cell.color] = (neighborColors[cell.color] || 0) + 1;
      }
      var weights = [];
      for (var k = 0; k < colors.length; k++) weights.push(neighborColors[colors[k]] ? 0.35 : 1);
      var sum = 0;
      for (var q = 0; q < weights.length; q++) sum += weights[q];
      var rnd = Math.random() * sum;
      for (colorIdx = 0; colorIdx < weights.length; colorIdx++) {
        rnd -= weights[colorIdx];
        if (rnd <= 0) break;
      }
      if (colorIdx >= colors.length) colorIdx = colors.length - 1;
    } else {
      colorIdx = Math.floor(Math.random() * colors.length);
    }
    var isDiamond = false;
    if (allowDiamond && !isBomb && !isMissile && !isCross && Math.random() < 0.28) isDiamond = true;
    return { color: colors[colorIdx], bomb: isBomb, missile: isMissile, cross: isCross, diamond: isDiamond };
  }

  function initGrid() {
    grid = [];
    var diamondCount = 0;
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var allowDiamond = diamondCount < maxDiamondsOnGrid();
        var cell = randCell(r, c, allowDiamond);
        if (cell.diamond) diamondCount++;
        grid.push(cell);
      }
    }
    resolveInitialMatches();
  }

  /** 시작·레벨업 시 3개 이상 붙은 색 제거 후 채우기 반복. 색상 다양하게 채워서 남는 매치 없앰. */
  function resolveInitialMatches() {
    var limit = 300;
    var group;
    while (limit-- > 0 && (group = findAnyMatch()) && group.length >= 3) {
      var result = collectToRemove(group);
      var seen = {};
      var list = [];
      for (var i = 0; i < result.toRemove.length; i++) {
        var t = result.toRemove[i];
        var k = t.r + ',' + t.c;
        if (seen[k]) continue;
        seen[k] = true;
        list.push(t);
      }
      var diamondCount = countDiamondsExcluding(list);
      for (var j = 0; j < list.length; j++) {
        var t = list[j];
        var allowDiamond = diamondCount < maxDiamondsOnGrid();
        var cell = randCell(t.r, t.c, allowDiamond);
        if (cell.diamond) diamondCount++;
        set(t.r, t.c, cell);
      }
    }
  }
  /** 레벨당 제한 시간(초): 1=30, 2=65, 3=70 ... */
  function getLevelTimeLimit(lv) {
    if (lv <= 1) return 30;
    return 55 + Math.min(lv, 10) * 5;
  }

  function startLevelTimer() {
    levelStartTime = Date.now();
    levelTimeLimitSec = getLevelTimeLimit(level);
    if (timerIntervalId) clearInterval(timerIntervalId);
    timerIntervalId = setInterval(function() {
      if (gameOver) return;
      var elapsed = (Date.now() - levelStartTime) / 1000;
      var left = Math.max(0, Math.ceil(levelTimeLimitSec - elapsed));
      if (timerEl) timerEl.textContent = left;
      if (timerWrap) {
        timerWrap.classList.remove('warning', 'danger');
        if (left <= 10) timerWrap.classList.add('danger');
        else if (left <= 20) timerWrap.classList.add('warning');
      }
      if (elapsed >= levelTimeLimitSec) {
        if (timerIntervalId) clearInterval(timerIntervalId);
        timerIntervalId = null;
        gameOver = true;
        gameOverUntil = Date.now();
        resetInputState();
        draw();
        if (gameOverOverlay) gameOverOverlay.style.display = 'flex';
      }
    }, 200);
  }

  function updateProgressBar() {
    if (!levelProgressEl) return;
    var need = getDiamondsToNextLevel(level);
    var pct = need > 0 ? Math.min(100, (diamondsRemovedThisLevel / need) * 100) : 100;
    levelProgressEl.style.width = pct + '%';
    if (diamondsEl) diamondsEl.textContent = diamondsRemovedThisLevel + '/' + need;
  }

  function get(r, c) { return grid[id(r, c)]; }
  function set(r, c, cell) { grid[id(r, c)] = cell; }

  /** (r,c)에 color를 둘 경우 연결된 같은 색 개수 (3 이상이면 매치됨) */
  function countGroupIfSet(r, c, color) {
    var visited = {};
    var count = 0;
    function dfs(rr, cc) {
      var i = id(rr, cc);
      if (visited[i]) return;
      var cell = get(rr, cc);
      var cellColor = (rr === r && cc === c) ? color : (cell ? cell.color : null);
      if (cellColor !== color) return;
      visited[i] = true;
      count++;
      var nb = neighbors(rr, cc);
      for (var j = 0; j < nb.length; j++) dfs(nb[j].r, nb[j].c);
    }
    dfs(r, c);
    return count;
  }

  /** 리필용: 이 칸에 넣어도 3개 이상 매치가 안 나는 색으로만 셀 생성 */
  function randCellNoMatch(r, c, allowDiamond) {
    var colors = getColorsForLevel(level);
    var safe = [];
    for (var k = 0; k < colors.length; k++) {
      if (countGroupIfSet(r, c, colors[k]) < 3) safe.push(colors[k]);
    }
    var pool = safe.length > 0 ? safe : colors;
    var color = pool[Math.floor(Math.random() * pool.length)];
    var allowItem = totalRemoved >= getItemThreshold();
    var itemMult = 1 / (1 + (level - 1) * 0.28);
    var isBomb = allowItem && Math.random() < BOMB_CHANCE * itemMult;
    var isMissile = allowItem && !isBomb && Math.random() < MISSILE_CHANCE * itemMult;
    var isCross = allowItem && !isBomb && !isMissile && Math.random() < CROSS_CHANCE * itemMult;
    var isDiamond = false;
    if (allowDiamond && !isBomb && !isMissile && !isCross && Math.random() < 0.28) isDiamond = true;
    return { color: color, bomb: isBomb, missile: isMissile, cross: isCross, diamond: isDiamond };
  }

  function findGroup(r, c) {
    var cell = get(r, c);
    if (!cell) return [];
    var key = cell.color;
    var visited = {};
    var list = [];
    function dfs(rr, cc) {
      var i = id(rr, cc);
      if (visited[i]) return;
      var c2 = get(rr, cc);
      if (!c2 || c2.color !== key) return;
      visited[i] = true;
      list.push({ r: rr, c: cc });
      var nb = neighbors(rr, cc);
      for (var j = 0; j < nb.length; j++) dfs(nb[j].r, nb[j].c);
    }
    dfs(r, c);
    return list;
  }

  function collectToRemove(group) {
    var toRemove = [];
    var hasBomb = false, hasMissile = false, hasCross = false;
    var bombPositions = [], missilePos = null, crossPos = null;
    for (var i = 0; i < group.length; i++) {
      var g = group[i];
      var cell = get(g.r, g.c);
      if (cell && cell.bomb) { hasBomb = true; bombPositions.push({ r: g.r, c: g.c }); }
      if (cell && cell.missile) { hasMissile = true; missilePos = { r: g.r, c: g.c }; }
      if (cell && cell.cross) { hasCross = true; crossPos = { r: g.r, c: g.c }; }
      toRemove.push({ r: g.r, c: g.c });
    }
    if (hasBomb && bombPositions.length > 0) {
      var processed = {};
      var queue = bombPositions.slice();
      while (queue.length > 0) {
        var pos = queue.shift();
        var key = pos.r + ',' + pos.c;
        if (processed[key]) continue;
        processed[key] = true;
        if (!bombPositions.some(function(b) { return b.r === pos.r && b.c === pos.c; })) bombPositions.push(pos);
        var nb = neighbors(pos.r, pos.c);
        for (var j = 0; j < nb.length; j++) {
          var nn = nb[j];
          if (!toRemove.some(function(t) { return t.r === nn.r && t.c === nn.c; })) toRemove.push({ r: nn.r, c: nn.c });
          var ncell = get(nn.r, nn.c);
          var nkey = nn.r + ',' + nn.c;
          if (ncell && ncell.bomb && !processed[nkey]) queue.push({ r: nn.r, c: nn.c });
        }
      }
    }
    if (hasMissile && missilePos) {
      for (var cc = 0; cc < COLS; cc++) {
        if (!toRemove.some(function(t) { return t.r === missilePos.r && t.c === cc; })) toRemove.push({ r: missilePos.r, c: cc });
      }
    }
    if (hasCross && crossPos) {
      for (var cc = 0; cc < COLS; cc++) {
        if (!toRemove.some(function(t) { return t.r === crossPos.r && t.c === cc; })) toRemove.push({ r: crossPos.r, c: cc });
      }
      for (var rr = 0; rr < ROWS; rr++) {
        if (!toRemove.some(function(t) { return t.r === rr && t.c === crossPos.c; })) toRemove.push({ r: rr, c: crossPos.c });
      }
    }
    return { toRemove: toRemove, bombPositions: bombPositions, missilePos: missilePos, crossPos: crossPos };
  }

  function findAnyMatch() {
    var visited = {};
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (!get(r, c)) continue;
        var group = findGroup(r, c);
        if (group.length < 3) continue;
        var uid = group.map(function(g) { return id(g.r, g.c); }).sort(function(a,b) { return a - b; })[0];
        if (visited[uid]) continue;
        visited[uid] = true;
        return group;
      }
    }
    return null;
  }

  /** 지워진 칸에만 새 블록 채우기. 리필 시 매치 안 나는 색을 우선 선택해 연쇄 확률 감소. 다이아몬드 개수 제한 유지. */
  function refillOnlyRemoved(toRemove) {
    var seen = {};
    var list = [];
    for (var i = 0; i < toRemove.length; i++) {
      var t = toRemove[i];
      var k = t.r + ',' + t.c;
      if (seen[k]) continue;
      seen[k] = true;
      list.push(t);
    }
    var diamondCount = countDiamondsExcluding(list);
    for (var i = 0; i < list.length; i++) {
      var t = list[i];
      var allowDiamond = diamondCount < maxDiamondsOnGrid();
      set(t.r, t.c, randCellNoMatch(t.r, t.c, allowDiamond));
      if (get(t.r, t.c).diamond) diamondCount++;
    }
    totalRemoved += list.length;
    return list.length;
  }

  function getComboLabel(count) {
    if (count <= 1) return '';
    if (count === 2) return '2연쇄 콤보! (더블)';
    if (count === 3) return '3연쇄 콤보! (트리플)';
    return count + '연쇄 콤보! (익사이팅)';
  }

  /** 레벨업에 필요한 제거 개수: 1→2=10개, 2→3=15개, 3→4=25개, 4→5=35개, 이후 +10씩 */
  function getRemovedToNextLevel(lv) {
    if (lv <= 1) return 10;
    if (lv === 2) return 15;
    if (lv === 3) return 25;
    if (lv === 4) return 35;
    return 35 + (lv - 4) * 10;
  }

  function applyRemove(toRemove, fromSwap) {
    if (!chainInProgress) {
      chainInProgress = true;
      chainStartTime = Date.now();
      comboCount = 1;
    }

    var result = collectToRemove(toRemove);
    var unique = [];
    var seen = {};
    for (var i = 0; i < result.toRemove.length; i++) {
      var t = result.toRemove[i];
      var k = t.r + ',' + t.c;
      if (seen[k]) continue;
      seen[k] = true;
      unique.push(t);
    }
    var diamondsInGroup = 0;
    for (var i = 0; i < unique.length; i++) {
      var cell = get(unique[i].r, unique[i].c);
      if (cell && cell.diamond) diamondsInGroup++;
    }
    refillOnlyRemoved(unique);
    diamondsRemovedThisLevel += diamondsInGroup;
    if (comboCount === 1) removedThisLevel += unique.length;
    var baseScore = unique.length * 10;
    var comboBonus = comboCount > 1 ? (comboCount - 1) * 12 : 0;
    score += baseScore + comboBonus;
    scorePopups.push({ score: baseScore + comboBonus, x: canvas.width / 2, y: canvas.height / 2, start: Date.now() });
    comboText = getComboLabel(comboCount);
    comboShowUntil = Date.now() + 1200;
    matchFlashUntil = Date.now() + 100;
    if (unique.length >= 6) {
      bigTextUntil = Date.now() + 1000;
      bigText = unique.length >= 8 ? '🎉 대박!!' : '대박!';
    }
    comboCount++;

    draw();

    var group = findAnyMatch();
    var nextGroup = (group && group.length >= 3 && comboCount < MAX_CHAIN_COMBO) ? group : null;

    if (nextGroup && nextGroup.length >= 3) {
      var nextCopy = nextGroup.map(function(p) { return { r: p.r, c: p.c }; });
      chainStepTimerId = setTimeout(function() {
        chainStepTimerId = null;
        applyRemove(nextCopy, fromSwap);
      }, CHAIN_STEP_DELAY_MS);
      chainDrawLoop();
      return;
    }

    chainInProgress = false;
    if (chainStepTimerId != null) clearTimeout(chainStepTimerId);
    chainStepTimerId = null;

    if (scoreEl) scoreEl.textContent = score;
    var needToNext = getDiamondsToNextLevel(level);
    updateProgressBar();

    if (diamondsRemovedThisLevel >= needToNext) {
      level++;
      removedThisLevel = 0;
      diamondsRemovedThisLevel = 0;
      if (timerIntervalId) clearInterval(timerIntervalId);
      timerIntervalId = null;
      applyGridSize();
      initGrid();
      if (levelEl) levelEl.textContent = level;
      updateProgressBar();
      comboCount = 0;
      resetInputState();
      levelUpUntil = Date.now() + 1500;
      levelUpDrawLoop();
      return;
    }
    resetInputState();
    comboDrawLoop();
  }

  function comboDrawLoop() {
    draw();
    var now = Date.now();
    if (now < comboShowUntil || now < matchFlashUntil || now < bigTextUntil || scorePopups.length > 0) {
      requestAnimationFrame(comboDrawLoop);
    }
  }

  function levelUpDrawLoop() {
    draw();
    if (Date.now() < levelUpUntil) {
      requestAnimationFrame(levelUpDrawLoop);
    } else {
      levelUpUntil = 0;
      draw();
      resetInputState();
      startLevelTimer();
    }
  }

  function chainDrawLoop() {
    draw();
    if (chainStepTimerId != null) requestAnimationFrame(chainDrawLoop);
  }

  function resetInputState() {
    selected = [];
    strokeColor = null;
    isDragging = false;
    pointerDownCell = null;
    swapFirst = null;
  }

  function doSwapAndCheck(r1, c1, r2, c2) {
    var a = get(r1, c1);
    var b = get(r2, c2);
    if (!a || !b) return;
    swapAnim = {
      start: Date.now(),
      r1: r1, c1: c1, r2: r2, c2: c2,
      cellA: a, cellB: b
    };
    swapAnimLoop();
  }

  function swapAnimLoop() {
    draw();
    if (!swapAnim) return;
    var elapsed = Date.now() - swapAnim.start;
    if (elapsed < SWAP_ANIM_DURATION_MS) {
      requestAnimationFrame(swapAnimLoop);
    } else {
      endSwapAnim();
    }
  }

  function endSwapAnim() {
    if (!swapAnim) return;
    var r1 = swapAnim.r1, c1 = swapAnim.c1, r2 = swapAnim.r2, c2 = swapAnim.c2;
    var a = swapAnim.cellA, b = swapAnim.cellB;
    set(r1, c1, b);
    set(r2, c2, a);
    swapAnim = null;

    var group1 = findGroup(r1, c1);
    var group2 = findGroup(r2, c2);
    var match = null;
    if (group1.length >= 3) match = group1;
    else if (group2.length >= 3) match = group2;
    if (match && match.length >= 3) {
      if (matchDelayTimerId != null) clearTimeout(matchDelayTimerId);
      matchDelayTimerId = null;
      resetInputState();
      draw();
      matchDelayUntil = Date.now() + MATCH_DELAY_MS;
      var result = collectToRemove(match);
      var toRemoveCopy = result.toRemove.map(function(p) { return { r: p.r, c: p.c }; });
      matchDelayTimerId = setTimeout(function() {
        matchDelayTimerId = null;
        matchDelayUntil = 0;
        try {
          comboCount = 1;
          if (result.bombPositions && result.bombPositions.length || result.missilePos || result.crossPos) {
            hexAnim = { start: Date.now(), bombPositions: result.bombPositions || [], missilePos: result.missilePos, crossPos: result.crossPos, toRemove: toRemoveCopy };
            startHexAnim();
          } else {
            applyRemove(toRemoveCopy, true);
          }
        } finally {
          resetInputState();
          draw();
        }
      }, MATCH_DELAY_MS);
    } else {
      set(r1, c1, a);
      set(r2, c2, b);
      draw();
    }
  }

  function draw() {
    ctx.fillStyle = '#0d0d14';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.fillStyle = '#ffc857';
    var step = 24;
    for (var yy = 0; yy < canvas.height + step; yy += step) {
      for (var xx = 0; xx < canvas.width + step; xx += step) {
        if ((xx / step + yy / step) % 2 === 0) {
          ctx.beginPath();
          for (var i = 0; i < 6; i++) {
            var a = (Math.PI / 3) * i;
            var hx = xx + 6 * Math.cos(a), hy = yy + 6 * Math.sin(a);
            if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
          }
          ctx.closePath();
          ctx.fill();
        }
      }
    }
    ctx.restore();
    var sa = swapAnim;
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (sa && ((r === sa.r1 && c === sa.c1) || (r === sa.r2 && c === sa.c2))) continue;
        var cell = get(r, c);
        if (!cell) continue;
        var p = hexToPixel(r, c);
        var isSel = selected.some(function(s) { return s.r === r && s.c === c; });
        var isSwap = swapFirst && swapFirst.r === r && swapFirst.c === c;
        drawHex(p.x, p.y, cell.color, cell.bomb, cell.missile, cell.cross, cell.diamond, isSel || isSwap);
      }
    }
    if (sa) {
      var t = Math.min(1, (Date.now() - sa.start) / SWAP_ANIM_DURATION_MS);
      t = 1 - Math.pow(1 - t, 3);
      var p1 = hexToPixel(sa.r1, sa.c1), p2 = hexToPixel(sa.r2, sa.c2);
      var x1 = p1.x + (p2.x - p1.x) * t, y1 = p1.y + (p2.y - p1.y) * t;
      var x2 = p2.x + (p1.x - p2.x) * t, y2 = p2.y + (p1.y - p2.y) * t;
      drawHex(x1, y1, sa.cellA.color, sa.cellA.bomb, sa.cellA.missile, sa.cellA.cross, sa.cellA.diamond, false);
      drawHex(x2, y2, sa.cellB.color, sa.cellB.bomb, sa.cellB.missile, sa.cellB.cross, sa.cellB.diamond, false);
    }
    var now = Date.now();
    if (now < matchFlashUntil) {
      ctx.save();
      var flashAlpha = 1 - (now - (matchFlashUntil - 100)) / 100;
      ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha * 0.35 + ')';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }
    if (now < comboShowUntil && comboText) {
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#f1c40f';
      ctx.lineWidth = 3;
      ctx.font = 'bold 24px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.strokeText(comboText, canvas.width / 2, 50);
      ctx.fillText(comboText, canvas.width / 2, 50);
      ctx.restore();
    }
    for (var i = scorePopups.length - 1; i >= 0; i--) {
      var pop = scorePopups[i];
      var age = now - pop.start;
      if (age > 800) { scorePopups.splice(i, 1); continue; }
      var alpha = age < 100 ? 1 : 1 - (age - 100) / 700;
      ctx.save();
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fillText('+' + pop.score, pop.x, pop.y - age * 0.08);
      ctx.restore();
    }
    if (now < bigTextUntil && bigText) {
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#f1c40f';
      ctx.lineWidth = 4;
      ctx.font = 'bold 32px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.strokeText(bigText, canvas.width / 2, 80);
      ctx.fillText(bigText, canvas.width / 2, 80);
      ctx.restore();
    }
    if (now < levelUpUntil) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#f1c40f';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⭐ 레벨 ' + level + ' ⭐', canvas.width / 2, canvas.height / 2);
      ctx.restore();
    }
    if (gameOver) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.85)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#f87171';
      ctx.font = 'bold 26px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⏱ 시간 초과!', canvas.width / 2, canvas.height / 2 - 35);
      ctx.fillStyle = '#fbbf24';
      ctx.font = 'bold 22px sans-serif';
      ctx.fillText('최종 점수: ' + score, canvas.width / 2, canvas.height / 2 + 5);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.font = '14px sans-serif';
      ctx.fillText('아래 버튼을 눌러 주세요', canvas.width / 2, canvas.height / 2 + 45);
      ctx.restore();
    }
    if (hexAnim) {
      ctx.save();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      var elapsed = Date.now() - hexAnim.start;
      if (hexAnim.bombPositions && hexAnim.bombPositions.length) drawBombAnim(hexAnim.bombPositions, elapsed);
      if (hexAnim.missilePos) drawMissileAnim(hexAnim.missilePos, elapsed);
      if (hexAnim.crossPos) drawCrossAnim(hexAnim.crossPos, elapsed);
      ctx.restore();
    }
  }

  function drawBombAnim(bombPositions, elapsed) {
    var t = Math.min(1, elapsed / BOMB_ANIM_MS);
    var alpha = 1 - t * 0.9;
    if (alpha <= 0) return;
    ctx.save();
    for (var b = 0; b < bombPositions.length; b++) {
      var bombPos = bombPositions[b];
      var center = hexToPixel(bombPos.r, bombPos.c);
      var nb = neighbors(bombPos.r, bombPos.c);
      var positions = [{ r: bombPos.r, c: bombPos.c }].concat(nb);
      for (var i = 0; i < positions.length; i++) {
        var p = hexToPixel(positions[i].r, positions[i].c);
        var radius = R * (0.6 + t * 1.4);
        var g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
        g.addColorStop(0, 'rgba(255,240,200,' + alpha + ')');
        g.addColorStop(0.4, 'rgba(255,180,60,' + alpha * 0.9 + ')');
        g.addColorStop(0.8, 'rgba(255,80,20,' + alpha * 0.5 + ')');
        g.addColorStop(1, 'rgba(200,40,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }
  function drawMissileAnim(missilePos, elapsed) {
    var p = hexToPixel(missilePos.r, missilePos.c);
    var t = Math.min(1, elapsed / MISSILE_ANIM_MS);
    var alpha = 1 - t * 0.5;
    if (alpha <= 0) return;
    ctx.save();
    ctx.strokeStyle = 'rgba(120,200,255,' + alpha + ')';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, p.y);
    ctx.lineTo(canvas.width, p.y);
    ctx.stroke();
    ctx.restore();
  }
  function drawCrossAnim(crossPos, elapsed) {
    var p = hexToPixel(crossPos.r, crossPos.c);
    var t = Math.min(1, elapsed / CROSS_ANIM_MS);
    var alpha = 1 - t * 0.5;
    if (alpha <= 0) return;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,210,100,' + alpha + ')';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, p.y);
    ctx.lineTo(canvas.width, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, 0);
    ctx.lineTo(p.x, canvas.height);
    ctx.stroke();
    ctx.restore();
  }

  function animateHex() {
    if (!hexAnim) return;
    var elapsed = Date.now() - hexAnim.start;
    var duration = 300;
    if (hexAnim.bombPositions && hexAnim.bombPositions.length) duration = Math.max(duration, BOMB_ANIM_MS);
    if (hexAnim.missilePos) duration = Math.max(duration, MISSILE_ANIM_MS);
    if (hexAnim.crossPos) duration = Math.max(duration, CROSS_ANIM_MS);
    draw();
    ctx.save();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    if (hexAnim.bombPositions && hexAnim.bombPositions.length) drawBombAnim(hexAnim.bombPositions, elapsed);
    if (hexAnim.missilePos) drawMissileAnim(hexAnim.missilePos, elapsed);
    if (hexAnim.crossPos) drawCrossAnim(hexAnim.crossPos, elapsed);
    ctx.restore();
    if (elapsed >= duration) {
      if (hexAnimIntervalId != null) clearInterval(hexAnimIntervalId);
      hexAnimIntervalId = null;
      applyRemove(hexAnim.toRemove, false);
      hexAnim = null;
      resetInputState();
      draw();
    }
  }

  function startHexAnim() {
    if (hexAnimIntervalId != null) clearInterval(hexAnimIntervalId);
    hexAnimIntervalId = setInterval(animateHex, 50);
    animateHex();
  }

  function isInSelected(r, c) { return selected.some(function(s) { return s.r === r && s.c === c; }); }
  function isAdjacentToSelected(r, c) {
    for (var i = 0; i < selected.length; i++) {
      var nb = neighbors(selected[i].r, selected[i].c);
      for (var j = 0; j < nb.length; j++)
        if (nb[j].r === r && nb[j].c === c) return true;
    }
    return false;
  }

  function getCoords(e, touch) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
    var clientX = touch ? e.touches[0].clientX : e.clientX;
    var clientY = touch ? e.touches[0].clientY : e.clientY;
    return { px: (clientX - rect.left) * scaleX, py: (clientY - rect.top) * scaleY };
  }

  function onPointerDown(px, py) {
    var now = Date.now();
    if (gameOver) {
      restart();
      return;
    }
    if (chainInProgress) {
      if (now - chainStartTime > 8000) {
        chainInProgress = false;
        if (chainStepTimerId != null) clearTimeout(chainStepTimerId);
        chainStepTimerId = null;
        resetInputState();
      }
      return;
    }
    if (matchDelayUntil > 0) {
      if (now < matchDelayUntil) return;
      if (now > matchDelayUntil + 1500) {
        matchDelayUntil = 0;
        if (matchDelayTimerId != null) clearTimeout(matchDelayTimerId);
        matchDelayTimerId = null;
        resetInputState();
      }
    }
    if (hexAnim && (now - hexAnim.start) > 3000) {
      hexAnim = null;
      resetInputState();
    }
    if (hexAnim) return;
    if (swapAnim) return;
    var h = pixelToHex(px, py);
    if (!h) return;
    var cell = get(h.r, h.c);
    if (!cell) return;
    pointerDownCell = { r: h.r, c: h.c };
    selected = [];
    strokeColor = cell.color;
    selected.push({ r: h.r, c: h.c });
    isDragging = true;
    draw();
  }

  function onPointerMove(px, py) {
    if (!isDragging || !strokeColor) return;
    var h = pixelToHex(px, py);
    if (!h) return;
    var cell = get(h.r, h.c);
    if (!cell || cell.color !== strokeColor) return;
    if (isInSelected(h.r, h.c)) return;
    if (!isAdjacentToSelected(h.r, h.c)) return;
    selected.push({ r: h.r, c: h.c });
    draw();
  }

  function onPointerUp(px, py) {
    var h = px != null && py != null ? pixelToHex(px, py) : null;
    if (!isDragging) return;
    isDragging = false;

    var now = Date.now();
    if (gameOver) return;
    if (chainInProgress) {
      resetInputState();
      draw();
      return;
    }
    if (matchDelayUntil > 0 && now < matchDelayUntil) {
      resetInputState();
      draw();
      return;
    }
    if (hexAnim) {
      resetInputState();
      draw();
      return;
    }
    if (swapAnim) {
      resetInputState();
      draw();
      return;
    }

    if (selected.length >= 3) {
      var result = collectToRemove(selected);
      if (result.bombPositions && result.bombPositions.length || result.missilePos || result.crossPos) {
        hexAnim = { start: Date.now(), bombPositions: result.bombPositions || [], missilePos: result.missilePos, crossPos: result.crossPos, toRemove: result.toRemove };
        startHexAnim();
        draw();
      } else {
        applyRemove(result.toRemove, false);
        draw();
      }
      resetInputState();
      return;
    }

    var releaseCell = (h && get(h.r, h.c)) ? h : pointerDownCell;
    if (releaseCell && selected.length >= 1) {
      var rr = releaseCell.r, rc = releaseCell.c;
      if (!swapFirst) {
        swapFirst = { r: rr, c: rc };
      } else if (swapFirst.r === rr && swapFirst.c === rc) {
        swapFirst = null;
      } else if (isAdjacent(swapFirst.r, swapFirst.c, rr, rc)) {
        doSwapAndCheck(swapFirst.r, swapFirst.c, rr, rc);
        swapFirst = null;
      } else {
        swapFirst = { r: rr, c: rc };
      }
    } else {
      swapFirst = null;
    }
    selected = [];
    strokeColor = null;
    pointerDownCell = null;
    draw();
  }

  canvas.addEventListener('mousedown', function(e) {
    var co = getCoords(e, false);
    onPointerDown(co.px, co.py);
  });
  canvas.addEventListener('mousemove', function(e) {
    var co = getCoords(e, false);
    onPointerMove(co.px, co.py);
  });
  canvas.addEventListener('mouseup', function(e) {
    var co = getCoords(e, false);
    onPointerUp(co.px, co.py);
  });
  canvas.addEventListener('mouseleave', function() { onPointerUp(null, null); });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var co = getCoords(e, true);
    onPointerDown(co.px, co.py);
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var co = getCoords(e, true);
    onPointerMove(co.px, co.py);
  }, { passive: false });
  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
    var px = null, py = null;
    if (e.changedTouches && e.changedTouches[0]) {
      px = (e.changedTouches[0].clientX - rect.left) * scaleX;
      py = (e.changedTouches[0].clientY - rect.top) * scaleY;
    }
    onPointerUp(px, py);
  }, { passive: false });

  applyGridSize();
  initGrid();
  updateProgressBar();
  startLevelTimer();
  draw();

  function restart() {
    var currentLevel = level;
    gameOver = false;
    gameOverUntil = 0;
    if (timerIntervalId) clearInterval(timerIntervalId);
    timerIntervalId = null;
    resetInputState();
    swapAnim = null;
    hexAnim = null;
    if (hexAnimIntervalId != null) clearInterval(hexAnimIntervalId);
    hexAnimIntervalId = null;
    matchDelayUntil = 0;
    if (matchDelayTimerId) clearTimeout(matchDelayTimerId);
    matchDelayTimerId = null;
    chainInProgress = false;
    if (chainStepTimerId) clearTimeout(chainStepTimerId);
    chainStepTimerId = null;
    removedThisLevel = 0;
    diamondsRemovedThisLevel = 0;
    comboCount = 0;
    if (scoreEl) scoreEl.textContent = score;
    if (levelEl) levelEl.textContent = currentLevel;
    if (timerEl) timerEl.textContent = getLevelTimeLimit(currentLevel);
    if (timerWrap) timerWrap.classList.remove('warning', 'danger');
    applyGridSize();
    initGrid();
    updateProgressBar();
    startLevelTimer();
    if (gameOverOverlay) gameOverOverlay.style.display = 'none';
    draw();
  }

  if (gameOverRestartBtn) {
    function doRestart(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      setTimeout(function() { restart(); }, 10);
    }
    gameOverRestartBtn.addEventListener('click', doRestart);
    gameOverRestartBtn.addEventListener('pointerdown', doRestart);
    gameOverRestartBtn.addEventListener('touchend', function(e) {
      e.preventDefault();
      e.stopPropagation();
      setTimeout(function() { restart(); }, 10);
    }, { passive: false });
  }
  if (gameOverOverlay) {
    function onRestartTap(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      setTimeout(function() { restart(); }, 10);
    }
    gameOverOverlay.addEventListener('click', onRestartTap);
    gameOverOverlay.addEventListener('pointerdown', onRestartTap);
    gameOverOverlay.addEventListener('touchend', function(e) {
      e.preventDefault();
      e.stopPropagation();
      setTimeout(function() { restart(); }, 10);
    }, { passive: false });
  }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();
  </script>
</body>
</html>
