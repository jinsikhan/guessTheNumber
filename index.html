<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미니 게임</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #eee;
      padding: 1rem;
    }
    .game {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      color: #e94560;
    }
    .sub {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .range {
      text-align: center;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.5rem;
    }
    .timer {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #f1c40f;
      margin-bottom: 1.5rem;
    }
    .timer.warning {
      color: #f39c12;
      animation: pulse 0.8s ease-in-out infinite;
    }
    .timer-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .timer-bar-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #f1c40f, #e67e22);
      border-radius: 4px;
      transition: width 0.3s ease, background 0.3s;
    }
    .timer-bar.danger .timer-bar-fill {
      background: #e74c3c;
      animation: bar-pulse 0.5s ease-in-out infinite;
    }
    @keyframes bar-pulse {
      50% { opacity: 0.85; }
    }
    .countdown-pop {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      font-weight: 800;
      color: #e74c3c;
      text-shadow: 0 0 30px rgba(231,76,60,0.6);
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .countdown-pop.show {
      opacity: 1;
      animation: countdown-scale 0.4s ease-out;
    }
    @keyframes countdown-scale {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      70% { transform: translate(-50%, -50%) scale(1.15); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    @keyframes pulse {
      50% { opacity: 0.7; }
    }
    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    input[type="number"] {
      flex: 1;
      padding: 1rem 1.25rem;
      font-size: 1.1rem;
      border: 2px solid rgba(233, 69, 96, 0.3);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-family: inherit;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: #e94560;
    }
    input[type="number"]::placeholder {
      color: #666;
    }
    button {
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s, background 0.15s;
    }
    button:hover {
      background: #ff6b6b;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    .message {
      min-height: 2.5rem;
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .message.empty {
      background: transparent;
      color: transparent;
    }
    .message.hint-up {
      background: rgba(233, 69, 96, 0.2);
      color: #ff9f9f;
    }
    .message.hint-down {
      background: rgba(100, 149, 237, 0.2);
      color: #87ceeb;
    }
    .message.win {
      background: rgba(76, 175, 80, 0.3);
      color: #81c784;
    }
    .message.error {
      background: rgba(255, 152, 0, 0.2);
      color: #ffb74d;
    }
    .message.timeout {
      background: rgba(244, 67, 54, 0.25);
      color: #ef9a9a;
    }
    .tries {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
    }
    .tries span {
      color: #e94560;
      font-weight: 600;
    }
    .best {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
      margin-top: 0.25rem;
    }
    .best span {
      color: #f1c40f;
      font-weight: 600;
    }
    .again {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 1rem;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.1);
      color: #ccc;
    }
    .again:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    .difficulty {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .difficulty button {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.1);
      color: #aaa;
    }
    .difficulty button:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    .difficulty button.active {
      background: #e94560;
      color: #fff;
    }
    /* 탭 */
    .app-wrap {
      width: 100%;
      max-width: 640px;
    }
    .tab-buttons {
      display: flex;
      gap: 0;
      margin-bottom: 0;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
    }
    .tab-btn {
      flex: 1;
      padding: 0.9rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #888;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #ccc;
    }
    .tab-btn.active {
      background: rgba(255, 255, 255, 0.06);
      color: #e94560;
    }
    .tab-panel {
      display: none;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 0 0 20px 20px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: none;
    }
    .tab-panel.active {
      display: block;
    }
    /* 벽돌깨기 */
    .brick-wrap {
      text-align: center;
    }
    .brick-wrap h1 {
      margin-bottom: 0.5rem;
    }
    .brick-wrap .sub {
      margin-bottom: 1rem;
    }
    .brick-canvas-wrap {
      margin: 1rem auto;
      border-radius: 12px;
      overflow: hidden;
      background: #0d0d14;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    #brickCanvas {
      display: block;
      margin: 0 auto;
    }
    .brick-info {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #aaa;
    }
    .brick-info span {
      color: #f1c40f;
      font-weight: 700;
    }
    .brick-start {
      margin-top: 1rem;
      width: 100%;
    }
    /* 벌집 퍼즐 */
    .hex-wrap {
      text-align: center;
    }
    .hex-wrap h1 { margin-bottom: 0.5rem; }
    .hex-wrap .sub { margin-bottom: 1rem; }
    .hex-canvas-wrap {
      margin: 1rem auto;
      border-radius: 12px;
      overflow: hidden;
      background: #0d0d14;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
      max-width: 100%;
    }
    #hexCanvas {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      height: auto;
    }
    .hex-info {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #aaa;
    }
    .hex-info span { color: #f1c40f; font-weight: 700; }
    /* 모바일 대응 */
    @media (max-width: 640px) {
      body { padding: 0.5rem; align-items: flex-start; padding-top: 1rem; }
      .game { padding: 1.25rem; }
      .tab-panel { padding: 1.25rem; }
      .tab-btn { padding: 0.65rem 0.5rem; font-size: 0.8rem; }
      .brick-canvas-wrap, .hex-canvas-wrap { margin: 0.5rem auto; max-width: 100%; }
      #brickCanvas, #hexCanvas { max-width: 100%; height: auto; display: block; }
      .brick-info, .hex-info { flex-wrap: wrap; justify-content: center; gap: 0.75rem; }
    }
    @media (max-width: 480px) {
      h1 { font-size: 1.25rem; }
      .tab-btn { font-size: 0.75rem; padding: 0.6rem 0.25rem; }
    }
  </style>
</head>
<body>
  <div class="app-wrap">
    <div class="tab-buttons">
      <button type="button" class="tab-btn active" data-tab="guess">🔢 숫자</button>
      <button type="button" class="tab-btn" data-tab="brick">🧱 벽돌</button>
      <button type="button" class="tab-btn" data-tab="hex">🍯 벌집</button>
    </div>

    <div id="panel-guess" class="tab-panel active">
  <div class="game">
    <h1>🔢 숫자 맞추기</h1>
    <p class="sub">숫자를 맞춰보세요</p>
    <div class="difficulty">
      <button type="button" data-diff="easy" id="btn-easy">쉬움 1~50 (15초)</button>
      <button type="button" data-diff="normal" id="btn-normal" class="active">보통 1~100 (30초)</button>
      <button type="button" data-diff="hard" id="btn-hard">어려움 1~300 (40초)</button>
    </div>
    <p class="range" id="rangeText">범위: 1 ~ 100</p>
    <p class="timer" id="timer">남은 시간: 40초</p>
    <div class="timer-bar" id="timerBar">
      <div class="timer-bar-fill" id="timerBarFill"></div>
    </div>

    <div class="input-row">
      <input type="number" id="guess" placeholder="숫자 입력" min="1" max="100" autofocus>
      <button type="button" id="submit">확인</button>
    </div>

    <div class="message empty" id="message"></div>
    <p class="tries">시도 횟수: <span id="tries">0</span></p>
    <p class="best">최고 기록: <span id="best">-</span></p>
    <button type="button" class="again" id="again" style="display: none;">다시 하기</button>
  </div>
    </div>

    <div id="panel-brick" class="tab-panel">
      <div class="brick-wrap">
        <h1>🧱 벽돌 깨기</h1>
        <p class="sub">패들을 움직여 공을 받고 벽돌을 모두 깨세요</p>
        <div class="brick-canvas-wrap">
          <canvas id="brickCanvas" width="560" height="640"></canvas>
        </div>
        <div class="brick-info">
          <p>점수: <span id="brickScore">0</span></p>
          <p>목숨: <span id="brickLives">3</span></p>
        </div>
        <button type="button" class="again brick-start" id="brickStart">시작하기</button>
      </div>
    </div>

    <div id="panel-hex" class="tab-panel">
      <div class="hex-wrap">
        <h1>🍯 벌집 퍼즐</h1>
        <p class="sub">같은 색 벌집을 3개 이상 맞추면 사라져요. 폭탄·미사일을 활용하세요</p>
        <div class="hex-canvas-wrap">
          <canvas id="hexCanvas" width="360" height="420"></canvas>
        </div>
        <div class="hex-info">
          <p>레벨 <span id="hexLevel">1</span> &nbsp;|&nbsp; 점수: <span id="hexScore">0</span> &nbsp;|&nbsp; 다음 레벨까지 <span id="hexNext">200</span>점</p>
        </div>
      </div>
    </div>
  </div>

  <div class="countdown-pop" id="countdownPop" aria-hidden="true"></div>

  <script>
    (function () {
      var tabBtns = document.querySelectorAll('.tab-btn');
      var panels = document.querySelectorAll('.tab-panel');
      tabBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var tab = btn.getAttribute('data-tab');
          tabBtns.forEach(function (b) { b.classList.remove('active'); });
          panels.forEach(function (p) { p.classList.remove('active'); });
          btn.classList.add('active');
          document.getElementById('panel-' + tab).classList.add('active');
          var pop = document.getElementById('countdownPop');
          if (pop && tab !== 'guess') { pop.classList.remove('show'); pop.textContent = ''; }
        });
      });
    })();
  </script>
  <script>
    (function () {
      var canvas = document.getElementById('hexCanvas');
      if (!canvas || !canvas.getContext) return;
      var ctx = canvas.getContext('2d');
      var scoreEl = document.getElementById('hexScore');
      var levelEl = document.getElementById('hexLevel');
      var nextEl = document.getElementById('hexNext');
      var R = 20;
      var GAP = 4;
      var COLS = 8;
      var ROWS = 9;
      var HEX_W = 2 * R;
      var HEX_H = Math.sqrt(3) * R;
      var STEP_X = Math.sqrt(3) * R + GAP;
      var STEP_Y = 1.5 * R + GAP;
      var HEX_COLORS = ['#e74c3c', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6', '#1abc9c'];
      var score = 0;
      var level = 1;
      var POINTS_PER_LEVEL = 450;
      var totalRemoved = 0;
      var levelUpUntil = 0;
      var comboCount = 0;
      var comboShowUntil = 0;
      var matchFlashUntil = 0;
      var grid = [];
      var BOMB_CHANCE = 0.06;
      var MISSILE_CHANCE = 0.04;
      function getItemThreshold() { return 6 + level * 4; }
      var selected = [];
      var strokeColor = null;
      var isDragging = false;
      var hexAnim = null;
      var BOMB_ANIM_MS = 480;
      var MISSILE_ANIM_MS = 420;

      function id(r, c) { return r * COLS + c; }
      function neighbors(r, c) {
        var dcEven = [-1, 0, -1, 1, -1, 0];
        var dcOdd = [0, 1, -1, 1, 0, 1];
        var dr = [-1, -1, 0, 0, 1, 1];
        var dc = (r % 2 === 0) ? dcEven : dcOdd;
        var out = [];
        for (var i = 0; i < 6; i++) {
          var nr = r + dr[i], nc = c + dc[i];
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) out.push({ r: nr, c: nc });
        }
        return out;
      }

      function hexToPixel(r, c) {
        var x = GAP + (Math.sqrt(3) * R) / 2 + c * STEP_X + (r % 2) * (STEP_X * 0.5);
        var y = GAP + R + r * STEP_Y;
        return { x: x, y: y };
      }

      function pixelToHex(px, py) {
        var rApprox = Math.floor((py - GAP - R) / STEP_Y);
        var cApprox = Math.floor((px - GAP - (Math.sqrt(3) * R) / 2 - (rApprox % 2) * (STEP_X * 0.5)) / STEP_X);
        var best = null, bestD = 1e9;
        for (var dr = -1; dr <= 1; dr++) {
          for (var dc = -1; dc <= 1; dc++) {
            var rr = rApprox + dr, cc = cApprox + dc;
            if (rr < 0 || rr >= ROWS || cc < 0 || cc >= COLS) continue;
            var p = hexToPixel(rr, cc);
            var dx = px - p.x, dy = py - p.y;
            var d = Math.sqrt(dx * dx + dy * dy);
            if (d <= R * 0.95 && d < bestD) { bestD = d; best = { r: rr, c: cc }; }
          }
        }
        return best;
      }

      function drawHex(x, y, color, isBomb, isMissile, isSelected) {
        ctx.beginPath();
        for (var i = 0; i < 6; i++) {
          var a = Math.PI / 2 + (Math.PI / 3) * i;
          var hx = x + R * Math.cos(a), hy = y + R * Math.sin(a);
          if (i === 0) ctx.moveTo(hx, hy);
          else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        if (isSelected) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 3;
          ctx.stroke();
        }
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 1;
        ctx.stroke();
        if (isBomb) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 18px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('💣', x, y);
        } else if (isMissile) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 18px sans-serif';
          ctx.fillText('🚀', x, y);
        }
      }

      function getGridSize(lv) {
        if (lv <= 1) return { rows: 8, cols: 7 };
        if (lv === 2) return { rows: 8, cols: 8 };
        if (lv === 3) return { rows: 9, cols: 8 };
        if (lv === 4) return { rows: 9, cols: 9 };
        if (lv === 5) return { rows: 10, cols: 9 };
        return { rows: 10, cols: 10 };
      }

      function applyGridSize() {
        var sz = getGridSize(level);
        ROWS = sz.rows;
        COLS = sz.cols;
      }

      function initGrid() {
        grid = [];
        for (var r = 0; r < ROWS; r++) {
          for (var c = 0; c < COLS; c++) {
            grid.push(randCell());
          }
        }
      }

      function getColorsForLevel(lv) {
        var n = Math.min(2 + lv, 6);
        return HEX_COLORS.slice(0, n);
      }

      function randCell() {
        var colors = getColorsForLevel(level);
        var allowItem = totalRemoved >= getItemThreshold();
        var isBomb = allowItem && Math.random() < BOMB_CHANCE;
        var isMissile = allowItem && !isBomb && Math.random() < MISSILE_CHANCE;
        var colorIdx = Math.floor(Math.random() * colors.length);
        return { color: colors[colorIdx], bomb: isBomb, missile: isMissile };
      }

      function get(r, c) { return grid[r * COLS + c]; }
      function set(r, c, cell) { grid[r * COLS + c] = cell; }
      function remove(r, c) { set(r, c, null); }

      function findGroup(r, c) {
        var cell = get(r, c);
        if (!cell) return [];
        var key = cell.color;
        var visited = {};
        var list = [];
        function dfs(rr, cc) {
          var i = id(rr, cc);
          if (visited[i]) return;
          var c2 = get(rr, cc);
          if (!c2 || c2.color !== key) return;
          visited[i] = true;
          list.push({ r: rr, c: cc });
          var nb = neighbors(rr, cc);
          for (var j = 0; j < nb.length; j++) dfs(nb[j].r, nb[j].c);
        }
        dfs(r, c);
        return list;
      }

      function collectToRemove(group) {
        var toRemove = [];
        var hasBomb = false, hasMissile = false;
        var bombPos = null, missilePos = null;
        for (var i = 0; i < group.length; i++) {
          var g = group[i];
          var cell = get(g.r, g.c);
          if (cell.bomb) { hasBomb = true; bombPos = { r: g.r, c: g.c }; }
          if (cell.missile) { hasMissile = true; missilePos = { r: g.r, c: g.c }; }
          toRemove.push({ r: g.r, c: g.c });
        }
        if (hasBomb && bombPos) {
          for (var dr = -1; dr <= 1; dr++)
            for (var dc = -1; dc <= 1; dc++) {
              var rr = bombPos.r + dr, cc = bombPos.c + dc;
              if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) {
                var already = toRemove.some(function (t) { return t.r === rr && t.c === cc; });
                if (!already) toRemove.push({ r: rr, c: cc });
              }
            }
        }
        if (hasMissile && missilePos) {
          for (var cc = 0; cc < COLS; cc++) {
            var already = toRemove.some(function (t) { return t.r === missilePos.r && t.c === cc; });
            if (!already) toRemove.push({ r: missilePos.r, c: cc });
          }
          for (var rr = 0; rr < ROWS; rr++) {
            var already = toRemove.some(function (t) { return t.r === rr && t.c === missilePos.c; });
            if (!already) toRemove.push({ r: rr, c: missilePos.c });
          }
        }
        return { toRemove: toRemove, bombPos: bombPos, missilePos: missilePos };
      }

      function applyRemove(toRemove) {
        var seen = {};
        toRemove = toRemove.filter(function (t) {
          var k = t.r + ',' + t.c;
          if (seen[k]) return false;
          seen[k] = true;
          return true;
        });
        for (var i = 0; i < toRemove.length; i++) {
          var t = toRemove[i];
          remove(t.r, t.c);
        }
        // 새 그리드에만 쓰기 → 읽기/쓰기 겹침 없이 빈 칸만 채움
        var newGrid = [];
        for (var c = 0; c < COLS; c++) {
          var cells = [];
          for (var r = ROWS - 1; r >= 0; r--) {
            var cell = get(r, c);
            if (cell) cells.push(cell);
          }
          var idx = 0;
          for (var r = ROWS - 1; r >= 0; r--) {
            if (idx < cells.length) {
              newGrid[r * COLS + c] = cells[idx];
              idx++;
            } else {
              newGrid[r * COLS + c] = randCell();
            }
          }
        }
        for (var i = 0; i < ROWS * COLS; i++) grid[i] = newGrid[i];
        totalRemoved += toRemove.length;
        var baseScore = toRemove.length * 10;
        var comboBonus = comboCount > 1 ? (comboCount - 1) * 12 : 0;
        score += baseScore + comboBonus;
        if (scoreEl) scoreEl.textContent = score;
        comboShowUntil = Date.now() + 1200;
        matchFlashUntil = Date.now() + 100;
        var nextLevelAt = level * POINTS_PER_LEVEL;
        if (nextEl) nextEl.textContent = Math.max(0, nextLevelAt - score);
        var newLevel = 1 + Math.floor(score / POINTS_PER_LEVEL);
        if (newLevel > level) {
          level = newLevel;
          applyGridSize();
          initGrid();
          if (levelEl) levelEl.textContent = level;
          if (nextEl) nextEl.textContent = Math.max(0, level * POINTS_PER_LEVEL - score);
          levelUpUntil = Date.now() + 1500;
          levelUpDrawLoop();
        } else {
          comboDrawLoop();
        }
      }

      function levelUpDrawLoop() {
        draw();
        if (Date.now() < levelUpUntil) requestAnimationFrame(levelUpDrawLoop);
      }

      function comboDrawLoop() {
        draw();
        if (Date.now() < comboShowUntil || Date.now() < matchFlashUntil) requestAnimationFrame(comboDrawLoop);
      }

      function draw() {
        ctx.fillStyle = '#0d0d14';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (var r = 0; r < ROWS; r++) {
          for (var c = 0; c < COLS; c++) {
            var cell = get(r, c);
            if (!cell) continue;
            var p = hexToPixel(r, c);
            var isSel = selected.some(function (s) { return s.r === r && s.c === c; });
            drawHex(p.x, p.y, cell.color, cell.bomb, cell.missile, isSel);
          }
        }
        var now = Date.now();
        if (now < matchFlashUntil) {
          ctx.save();
          var flashAlpha = 1 - (now - (matchFlashUntil - 100)) / 100;
          ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha * 0.35 + ')';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.restore();
        }
        if (now < comboShowUntil && comboCount > 1) {
          ctx.save();
          ctx.fillStyle = '#fff';
          ctx.strokeStyle = '#f1c40f';
          ctx.lineWidth = 3;
          ctx.font = 'bold 26px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          var comboText = '🔥 콤보 x' + comboCount + '!';
          ctx.strokeText(comboText, canvas.width / 2, 50);
          ctx.fillText(comboText, canvas.width / 2, 50);
          ctx.restore();
        }
        if (now < levelUpUntil) {
          ctx.save();
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#f1c40f';
          ctx.font = 'bold 28px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('⭐ 레벨 ' + level + ' ⭐', canvas.width / 2, canvas.height / 2);
          ctx.restore();
        }
      }

      function drawBombAnim(bombPos, elapsed) {
        var p = hexToPixel(bombPos.r, bombPos.c);
        var t = Math.min(1, elapsed / BOMB_ANIM_MS);
        var radius = R * (1 + t * 4);
        var alpha = 1 - t * 1.2;
        if (alpha <= 0) return;
        ctx.save();
        var g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
        g.addColorStop(0, 'rgba(255,180,50,' + (alpha * 0.9) + ')');
        g.addColorStop(0.4, 'rgba(230,80,30,' + (alpha * 0.6) + ')');
        g.addColorStop(0.8, 'rgba(180,30,10,' + (alpha * 0.3) + ')');
        g.addColorStop(1, 'rgba(80,10,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawMissileAnim(missilePos, elapsed) {
        var p = hexToPixel(missilePos.r, missilePos.c);
        var t = Math.min(1, elapsed / MISSILE_ANIM_MS);
        var alpha = 1 - t * 0.7;
        var thick = 8 + (1 - t) * 12;
        if (alpha <= 0) return;
        ctx.save();
        ctx.strokeStyle = 'rgba(100,200,255,' + alpha + ')';
        ctx.lineWidth = thick;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(0, p.y);
        ctx.lineTo(canvas.width, p.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(p.x, 0);
        ctx.lineTo(p.x, canvas.height);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,' + alpha * 0.8 + ')';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, p.y);
        ctx.lineTo(canvas.width, p.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(p.x, 0);
        ctx.lineTo(p.x, canvas.height);
        ctx.stroke();
        ctx.restore();
      }

      function animateHex() {
        if (!hexAnim) return;
        var elapsed = Date.now() - hexAnim.start;
        var duration = 0;
        if (hexAnim.bombPos) duration = Math.max(duration, BOMB_ANIM_MS);
        if (hexAnim.missilePos) duration = Math.max(duration, MISSILE_ANIM_MS);
        if (duration === 0) duration = 300;
        draw();
        if (hexAnim.bombPos) drawBombAnim(hexAnim.bombPos, elapsed);
        if (hexAnim.missilePos) drawMissileAnim(hexAnim.missilePos, elapsed);
        if (elapsed < duration) {
          requestAnimationFrame(animateHex);
        } else {
          applyRemove(hexAnim.toRemove);
          hexAnim = null;
          draw();
        }
      }

      function isInSelected(r, c) {
        return selected.some(function (s) { return s.r === r && s.c === c; });
      }

      function isAdjacentToSelected(r, c) {
        for (var i = 0; i < selected.length; i++) {
          var nb = neighbors(selected[i].r, selected[i].c);
          for (var j = 0; j < nb.length; j++)
            if (nb[j].r === r && nb[j].c === c) return true;
        }
        return false;
      }

      function getCoords(e, touch) {
        var rect = canvas.getBoundingClientRect();
        var scaleX = canvas.width / rect.width;
        var scaleY = canvas.height / rect.height;
        var clientX = touch ? e.touches[0].clientX : e.clientX;
        var clientY = touch ? e.touches[0].clientY : e.clientY;
        return { px: (clientX - rect.left) * scaleX, py: (clientY - rect.top) * scaleY };
      }

      function onPointerDown(px, py) {
        var h = pixelToHex(px, py);
        if (!h) return;
        var cell = get(h.r, h.c);
        if (!cell) return;
        selected = [];
        strokeColor = cell.color;
        selected.push({ r: h.r, c: h.c });
        isDragging = true;
        draw();
      }

      function onPointerMove(px, py) {
        if (!isDragging || !strokeColor) return;
        var h = pixelToHex(px, py);
        if (!h) return;
        var cell = get(h.r, h.c);
        if (!cell || cell.color !== strokeColor) return;
        if (isInSelected(h.r, h.c)) return;
        if (!isAdjacentToSelected(h.r, h.c)) return;
        selected.push({ r: h.r, c: h.c });
        draw();
      }

      function onPointerUp() {
        if (!isDragging) return;
        isDragging = false;
        if (selected.length >= 3) {
          var result = collectToRemove(selected);
          var toRemove = result.toRemove;
          comboCount++;
          matchFlashUntil = Date.now() + 100;
          if (result.bombPos || result.missilePos) {
            hexAnim = { start: Date.now(), bombPos: result.bombPos, missilePos: result.missilePos, toRemove: toRemove };
            requestAnimationFrame(animateHex);
          } else {
            applyRemove(toRemove);
          }
        } else {
          comboCount = 0;
        }
        selected = [];
        strokeColor = null;
        draw();
      }

      canvas.addEventListener('mousedown', function (e) {
        var co = getCoords(e, false);
        onPointerDown(co.px, co.py);
      });
      canvas.addEventListener('mousemove', function (e) {
        var co = getCoords(e, false);
        onPointerMove(co.px, co.py);
      });
      canvas.addEventListener('mouseup', function () { onPointerUp(); });
      canvas.addEventListener('mouseleave', function () { onPointerUp(); });
      canvas.addEventListener('touchstart', function (e) {
        e.preventDefault();
        var co = getCoords(e, true);
        onPointerDown(co.px, co.py);
      }, { passive: false });
      canvas.addEventListener('touchmove', function (e) {
        e.preventDefault();
        var co = getCoords(e, true);
        onPointerMove(co.px, co.py);
      }, { passive: false });
      canvas.addEventListener('touchend', function (e) {
        e.preventDefault();
        onPointerUp();
      }, { passive: false });

      applyGridSize();
      initGrid();
      draw();
    })();
  </script>
  <script>
    (function () {
      var DIFF = {
        easy:   { max: 50,  time: 15 },
        normal: { max: 100, time: 30 },
        hard:   { max: 300, time: 40 }
      };
      var currentDiff = 'normal';
      var TIME_LIMIT = DIFF.normal.time;
      var MAX_NUM = DIFF.normal.max;
      var answer = 0;
      var tries = 0;
      var isDone = false;
      var timerId = null;
      var remainingSeconds = TIME_LIMIT;

      var guessInput = document.getElementById('guess');
      var submitBtn = document.getElementById('submit');
      var messageEl = document.getElementById('message');
      var triesEl = document.getElementById('tries');
      var timerEl = document.getElementById('timer');
      var againBtn = document.getElementById('again');
      var bestEl = document.getElementById('best');
      var rangeEl = document.getElementById('rangeText');
      var timerBar = document.getElementById('timerBar');
      var timerBarFill = document.getElementById('timerBarFill');
      var countdownPop = document.getElementById('countdownPop');

      function getStorageKey() {
        return 'guessTheNumberBest_' + currentDiff;
      }
      function getBest() {
        var v = localStorage.getItem(getStorageKey());
        return v === null ? null : parseInt(v, 10);
      }
      function setBest(n) {
        localStorage.setItem(getStorageKey(), String(n));
      }
      function updateBestDisplay() {
        var b = getBest();
        bestEl.textContent = b !== null ? b + '번' : '-';
      }

      function clearTimer() {
        if (timerId) {
          clearInterval(timerId);
          timerId = null;
        }
      }

      function startTimer() {
        clearTimer();
        remainingSeconds = TIME_LIMIT;
        timerEl.textContent = '남은 시간: ' + remainingSeconds + '초';
        timerEl.classList.remove('warning');
        timerBar.classList.remove('danger');
        timerBarFill.style.width = '100%';
        countdownPop.classList.remove('show');
        countdownPop.textContent = '';
        timerId = setInterval(function () {
          remainingSeconds -= 1;
          var pct = Math.max(0, (remainingSeconds / TIME_LIMIT) * 100);
          timerBarFill.style.width = pct + '%';
          timerEl.textContent = '남은 시간: ' + remainingSeconds + '초';
          if (remainingSeconds <= 5) {
            timerBar.classList.add('danger');
            timerEl.classList.add('warning');
            if (document.getElementById('panel-guess').classList.contains('active')) {
              countdownPop.textContent = remainingSeconds;
              countdownPop.classList.add('show');
              setTimeout(function () { countdownPop.classList.remove('show'); }, 400);
            }
          } else if (remainingSeconds <= 10) {
            timerEl.classList.add('warning');
          }
          if (remainingSeconds <= 0) {
            clearTimer();
            countdownPop.classList.remove('show');
            countdownPop.textContent = '';
            isDone = true;
            showMessage('시간 초과! 정답은 ' + answer + ' 이었어요.', 'timeout');
            guessInput.disabled = true;
            submitBtn.disabled = true;
            againBtn.style.display = 'block';
          }
        }, 1000);
      }

      function startGame() {
        var d = DIFF[currentDiff];
        MAX_NUM = d.max;
        TIME_LIMIT = d.time;
        answer = Math.floor(Math.random() * MAX_NUM) + 1;
        tries = 0;
        isDone = false;
        triesEl.textContent = '0';
        messageEl.textContent = '';
        messageEl.className = 'message empty';
        guessInput.value = '';
        guessInput.min = '1';
        guessInput.max = String(MAX_NUM);
        guessInput.placeholder = '1 ~ ' + MAX_NUM;
        guessInput.disabled = false;
        submitBtn.disabled = false;
        againBtn.style.display = 'none';
        rangeEl.textContent = '범위: 1 ~ ' + MAX_NUM;
        startTimer();
        guessInput.focus();
        updateBestDisplay();
      }

      function setDifficulty(diff) {
        if (isDone || tries === 0) {
          currentDiff = diff;
          document.querySelectorAll('.difficulty button').forEach(function (btn) {
            btn.classList.toggle('active', btn.getAttribute('data-diff') === diff);
          });
          startGame();
        }
      }

      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = 'message ' + type;
      }

      function checkGuess() {
        if (isDone) return;

        var raw = guessInput.value.trim();
        var num = parseInt(raw, 10);

        if (raw === '' || isNaN(num)) {
          showMessage('1에서 ' + MAX_NUM + ' 사이의 숫자를 입력하세요.', 'error');
          return;
        }
        if (num < 1 || num > MAX_NUM) {
          showMessage('1에서 ' + MAX_NUM + ' 사이로 입력하세요.', 'error');
          return;
        }

        tries += 1;
        triesEl.textContent = tries;

        if (num === answer) {
          isDone = true;
          clearTimer();
          countdownPop.classList.remove('show');
          countdownPop.textContent = '';
          timerBarFill.style.width = '0%';
          var best = getBest();
          var isNewBest = best === null || tries < best;
          if (isNewBest) {
            setBest(tries);
            updateBestDisplay();
          }
          var msg = '정답입니다! 🎉 (' + tries + '번 만에 맞췄어요)';
          if (remainingSeconds <= 5 && remainingSeconds > 0) {
            msg = '아슬아슬! ' + remainingSeconds + '초 남기고 성공! 🎉 (' + tries + '번 만에)';
          }
          if (isNewBest) msg += ' 최고 기록 갱신!';
          showMessage(msg, 'win');
          guessInput.disabled = true;
          submitBtn.disabled = true;
          againBtn.style.display = 'block';
          return;
        }

        if (num < answer) {
          showMessage('더 커요 ↑', 'hint-up');
        } else {
          showMessage('더 작아요 ↓', 'hint-down');
        }
        guessInput.value = '';
        guessInput.focus();
      }

      submitBtn.addEventListener('click', checkGuess);      guessInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') checkGuess();
      });
      againBtn.addEventListener('click', startGame);
      document.getElementById('btn-easy').addEventListener('click', function () { setDifficulty('easy'); });
      document.getElementById('btn-normal').addEventListener('click', function () { setDifficulty('normal'); });
      document.getElementById('btn-hard').addEventListener('click', function () { setDifficulty('hard'); });

      startGame();
    })();
  </script>
  <script>
    (function () {
      var canvas = document.getElementById('brickCanvas');
      var ctx = canvas.getContext('2d');
      var scoreEl = document.getElementById('brickScore');
      var livesEl = document.getElementById('brickLives');
      var startBtn = document.getElementById('brickStart');

      var BRICK_COLORS = ['#e74c3c', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6'];
      var COLS = 10;
      var ROWS = 6;
      var BRICK_W = 50;
      var BRICK_H = 24;
      var BRICK_PAD = 6;
      var PADDLE_W = 100;
      var PADDLE_W_WIDE = 140;
      var PADDLE_H = 14;
      var BALL_R = 6;
      var PADDLE_Y = canvas.height - 30;
      var ITEM_DROP_CHANCE = 0.28;
      var ITEM_SIZE = 14;
      var ITEM_FALL = 2.5;
      var ITEM_TYPES = [
        { id: 'expand', color: '#3498db', label: 'W' },
        { id: 'life', color: '#2ecc71', label: '+1' },
        { id: 'slow', color: '#9b59b6', label: 'S' },
        { id: 'score', color: '#f1c40f', label: '50' },
        { id: 'multi', color: '#e67e22', label: '★' }
      ];

      var bricks = [];
      var items = [];
      var paddleX = (canvas.width - PADDLE_W) / 2;
      var currentPaddleW = PADDLE_W;
      var paddleExpandUntil = 0;
      var ballSlowUntil = 0;
      var balls = [];
      var ballSpeedMult = 1;
      var score = 0;
      var lives = 3;
      var running = false;
      var animId = null;
      var frameCount = 0;

      function initBricks() {
        bricks = [];
        items = [];
        for (var row = 0; row < ROWS; row++) {
          for (var col = 0; col < COLS; col++) {
            var isStrong = row >= 2 && Math.random() < 0.35;
            bricks.push({
              x: BRICK_PAD + col * (BRICK_W + BRICK_PAD),
              y: 50 + row * (BRICK_H + BRICK_PAD),
              w: BRICK_W,
              h: BRICK_H,
              color: BRICK_COLORS[row % BRICK_COLORS.length],
              hp: isStrong ? 2 : 1
            });
          }
        }
      }

      function spawnItem(brick) {
        if (Math.random() > ITEM_DROP_CHANCE) return;
        var typeIdx = Math.floor(Math.random() * ITEM_TYPES.length);
        var t = ITEM_TYPES[typeIdx];
        items.push({
          x: brick.x + brick.w / 2 - ITEM_SIZE / 2,
          y: brick.y + brick.h / 2 - ITEM_SIZE / 2,
          type: t.id,
          color: t.color,
          label: t.label
        });
      }

      function draw() {
        ctx.fillStyle = '#0d0d14';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        bricks.forEach(function (b) {
          ctx.fillStyle = b.color;
          ctx.fillRect(b.x, b.y, b.w, b.h);
          if (b.hp >= 2) {
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('2', b.x + b.w / 2, b.y + b.h / 2);
          }
          ctx.strokeStyle = b.hp >= 2 ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.3)';
          ctx.lineWidth = b.hp >= 2 ? 2 : 1;
          ctx.strokeRect(b.x, b.y, b.w, b.h);
        });

        items.forEach(function (it) {
          ctx.fillStyle = it.color;
          ctx.fillRect(it.x, it.y, ITEM_SIZE, ITEM_SIZE);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1;
          ctx.strokeRect(it.x, it.y, ITEM_SIZE, ITEM_SIZE);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 10px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(it.label, it.x + ITEM_SIZE / 2, it.y + ITEM_SIZE / 2);
        });

        var pw = currentPaddleW;
        var px = paddleX + (currentPaddleW - pw) / 2;
        if (pw > PADDLE_W) px = paddleX - (pw - PADDLE_W) / 2;
        ctx.fillStyle = '#e94560';
        ctx.fillRect(px, PADDLE_Y, pw, PADDLE_H);

        balls.forEach(function (b) {
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function update() {
        if (!running) return;
        frameCount++;
        var pw = currentPaddleW;
        var px = paddleX;
        if (pw > PADDLE_W) px = paddleX - (pw - PADDLE_W) / 2;

        if (paddleExpandUntil > 0 && frameCount >= paddleExpandUntil) {
          currentPaddleW = PADDLE_W;
          paddleExpandUntil = 0;
        }
        if (ballSlowUntil > 0 && frameCount >= ballSlowUntil) {
          ballSpeedMult = 1;
          ballSlowUntil = 0;
        }

        var i = 0;
        while (i < balls.length) {
          var b = balls[i];
          b.x += b.dx * ballSpeedMult;
          b.y += b.dy * ballSpeedMult;

          if (b.x - BALL_R <= 0 || b.x + BALL_R >= canvas.width) b.dx = -b.dx;
          if (b.y - BALL_R <= 0) b.dy = -b.dy;

          if (b.y + BALL_R >= PADDLE_Y && b.y - BALL_R <= PADDLE_Y + PADDLE_H &&
              b.x >= px && b.x <= px + pw) {
            b.dy = -Math.abs(b.dy);
            var hitPos = (b.x - px) / pw;
            b.dx = (hitPos - 0.5) * 10;
          }

          if (b.y - BALL_R > canvas.height) {
            balls.splice(i, 1);
            continue;
          }

          var brickHit = false;
          for (var k = bricks.length - 1; k >= 0; k--) {
            var br = bricks[k];
            if (b.x + BALL_R >= br.x && b.x - BALL_R <= br.x + br.w &&
                b.y + BALL_R >= br.y && b.y - BALL_R <= br.y + br.h) {
              b.dy = -b.dy;
              br.hp--;
              if (br.hp <= 0) {
                spawnItem(br);
                bricks.splice(k, 1);
                score += 10;
                scoreEl.textContent = score;
                if (bricks.length === 0) {
                  running = false;
                  cancelAnimationFrame(animId);
                  ctx.fillStyle = 'rgba(0,0,0,0.7)';
                  ctx.fillRect(0, 0, canvas.width, canvas.height);
                  ctx.fillStyle = '#2ecc71';
                  ctx.font = 'bold 24px sans-serif';
                  ctx.textAlign = 'center';
                  ctx.fillText('클리어!', canvas.width / 2, canvas.height / 2);
                  startBtn.style.display = 'block';
                  startBtn.textContent = '다시 하기';
                }
              }
              brickHit = true;
              break;
            }
          }
          i++;
        }

        if (balls.length === 0) {
          lives--;
          livesEl.textContent = lives;
          if (lives <= 0) {
            running = false;
            cancelAnimationFrame(animId);
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('게임 오버', canvas.width / 2, canvas.height / 2);
            startBtn.style.display = 'block';
            startBtn.textContent = '다시 하기';
            return;
          }
          var cx = canvas.width / 2;
          balls.push({ x: cx, y: PADDLE_Y - BALL_R - 2, dx: 4, dy: -4 });
        }

        for (var j = items.length - 1; j >= 0; j--) {
          var it = items[j];
          it.y += ITEM_FALL;
          if (it.y > canvas.height) {
            items.splice(j, 1);
            continue;
          }
          var pwx = currentPaddleW;
          var pxx = paddleX;
          if (pwx > PADDLE_W) pxx = paddleX - (pwx - PADDLE_W) / 2;
          if (it.y + ITEM_SIZE >= PADDLE_Y && it.y <= PADDLE_Y + PADDLE_H &&
              it.x + ITEM_SIZE >= pxx && it.x <= pxx + pwx) {
            if (it.type === 'expand') {
              currentPaddleW = PADDLE_W_WIDE;
              paddleExpandUntil = frameCount + 600;
            } else if (it.type === 'life') {
              lives++;
              livesEl.textContent = lives;
            } else if (it.type === 'slow') {
              ballSpeedMult = 0.6;
              ballSlowUntil = frameCount + 300;
            } else if (it.type === 'score') {
              score += 50;
              scoreEl.textContent = score;
            } else if (it.type === 'multi') {
              var centerX = pxx + pwx / 2;
              var baseSpeed = 4;
              balls.push({ x: centerX, y: PADDLE_Y - BALL_R - 2, dx: -3, dy: -baseSpeed });
              balls.push({ x: centerX, y: PADDLE_Y - BALL_R - 2, dx: 0, dy: -baseSpeed });
              balls.push({ x: centerX, y: PADDLE_Y - BALL_R - 2, dx: 3, dy: -baseSpeed });
            }
            items.splice(j, 1);
          }
        }
      }

      function loop() {
        update();
        draw();
        if (running) animId = requestAnimationFrame(loop);
      }

      function startBrickGame() {
        initBricks();
        score = 0;
        lives = 3;
        frameCount = 0;
        currentPaddleW = PADDLE_W;
        paddleExpandUntil = 0;
        ballSpeedMult = 1;
        ballSlowUntil = 0;
        scoreEl.textContent = '0';
        livesEl.textContent = '3';
        paddleX = (canvas.width - PADDLE_W) / 2;
        balls = [{ x: canvas.width / 2, y: PADDLE_Y - BALL_R - 2, dx: 4, dy: -4 }];
        startBtn.style.display = 'none';
        running = true;
        loop();
      }

      canvas.addEventListener('mousemove', function (e) {
        var rect = canvas.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var scale = canvas.width / rect.width;
        paddleX = (x * scale) - PADDLE_W / 2;
        if (paddleX < 0) paddleX = 0;
        if (paddleX > canvas.width - PADDLE_W) paddleX = canvas.width - PADDLE_W;
      });

      startBtn.addEventListener('click', startBrickGame);
      initBricks();
      draw();
    })();
  </script>
</body>
</html>
